syntax = "proto3";
package status;

option csharp_namespace = "art.media.platform.status";
option go_package = "github.com/art-media-platform/amp.SDK/stdlib/status";


// Code expresses status and error codes.
enum Code {
    Nil                         = 0;

    Unnamed                     = -23001;
    AssertFailed                = -23002;
    Unimplemented               = -23004;
    Timeout                     = -23005;
    ShuttingDown                = -23006;
    NotConnected                = -23007;
    AuthFailed                  = -23008;
    LoginFailed                 = -23009;
    Expired                     = -23010;
    NotReady                    = -23011;
    Cancelled                   = -23012;
    ItemNotFound                = -23013;
    ParseFailed                 = -23014;

    ContextNotReady             = -23020;
    RequestClosed               = -23021;
    BadRequest                  = -23022;
    BadTag                      = -23023;
    BadValue                    = -23024;
    AlreadyExists               = -23025;
    CommitFailed                = -23028;
    StorageFailure              = -23030;
    MalformedTx                 = -23032;

    DataFailure                 = -23041;
    PinFailed                   = -23043;
    ProviderErr                 = -23045;

    InsufficientPermissions     = -23051;

    AlreadyRegistered           = -23100;
    DecryptFailed               = -23102;
    VerifySignatureFailed       = -23103;
    BadKeyFormat                = -23104;
    KeyGenerationFailed         = -23105;
    SigningFailed               = -23109;
    KeyringNotFound             = -23106;
}

// Severity expresses the severity of a status message for logging and alerting purposes.
enum Severity {
    Debug   = 0;
    Info    = 1;
    Warning = 2;
    Error   = 3;
}

// Status is a general purpose status message.
message Status {
    Code        Code     = 1; // numberical code
    Severity    Severity = 2; // which log to larget
    int32       Level    = 3; // log level, 0 is highest priority
    string      Message  = 4; // human readable message, may be empty
    fixed64     TimeID_0 = 8; // time-based ID, for ordering and deduplication use - tag.NowID()
    fixed64     TimeID_1 = 9; // trailing part of TimeID.
}