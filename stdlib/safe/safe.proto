syntax = "proto3";
package safe;

option go_package = "github.com/art-media-platform/amp.SDK/stdlib/safe";
option csharp_namespace = "art.media.platform.safe";


enum Const {
    Nil                             = 0;
    SealedTomeVersion               = 1;
}


// GuardInfo describes a Guard's capabilities and identity.
message GuardInfo {
    string  Provider                = 1;    // e.g. "file", "yubikey", "tpm"
    string  Label                   = 2;    // Human-readable label
    bytes   KeyID                   = 3;    // Opaque identifier for the root key material

    bool    HardwareBacked          = 10;   // True if root material resides in tamper-resistant hardware
    bool    Removable               = 11;   // True if the Guard can be physically detached (e.g. YubiKey)
    bool    RequiresPIN             = 12;   // True if a PIN is required for each operation
    bool    RequiresTouch           = 13;   // True if physical touch confirmation is required
    bool    ExportableRoot          = 14;   // True if the root material can be exported
}


// WrappedDEK holds a protected Data Encryption Key and all parameters needed to recover it.
message WrappedDEK {
    uint32  Version                 = 1;
    string  Provider                = 2;    // Guard provider that created this wrapping
    bytes   KeyID                   = 3;    // Identifies the root key used to derive the wrapping key

    string  KDF                     = 5;    // KDF used to derive the wrapping key (e.g. "HKDF-SHA256")
    string  Cipher                  = 6;    // AEAD cipher used to encrypt the DEK (e.g. "XChaCha20-Poly1305")

    bytes   Salt                    = 8;    // KDF salt
    bytes   Nonce                   = 9;    // AEAD nonce

    bytes   ProviderParams          = 10;   // Provider-specific parameters (if applicable)
    bytes   EphemeralPubKey         = 13;   // Used by asymmetric protectors (e.g. YubiKey PIV ECDH)
    bytes   Cipherblob              = 15;   // AEAD ciphertext of the DEK
}


// SealedTome is a serialized and encrypted KeyTome, ready for persistent storage.
//
// Lifecycle:
//   Open:  TomeStore.Load() -> Guard.UnwrapDEK() -> AEAD_Decrypt(DEK, Cipherblob) -> KeyTome
//   Close: Marshal(KeyTome) -> new DEK -> Guard.WrapDEK(DEK) -> AEAD_Encrypt(DEK, payload) -> TomeStore.Save()
message SealedTome {
    uint32      Version             = 1;
    WrappedDEK  WrappedDEK          = 2;    // Sufficient to identify and recover the DEK
    string      Purpose             = 3;    // Opaque tag: "backup", "export", "session", etc.
    string      TomeCipher          = 4;    // AEAD cipher for the encrypted KeyTome payload
    bytes       TomeNonce           = 6;    // Nonce for encrypting the serialized KeyTome
    bytes       Cipherblob          = 7;    // AEAD cipherblob of the serialized KeyTome := AEAD_Encrypt(DEK, TomeNonce, Marshal(KeyTome), AAD)
}


// KeyType identifies the cryptographic role a key plays within an Enclave.
// Algorithm, hybrid composition, lifecycle, and hardware backing are
// expressed elsewhere (CryptoKit, lifecycle metadata, GuardInfo).
//
// The three roles span the operation space: shared-secret encryption (Symmetric),
// keypair-based shared-secret agreement / encapsulation (Asymmetric), and
// keypair-based authentication (Signing).  A CryptoKit may derive one role
// from another internally (e.g. Poly25519 derives an Asymmetric key from a
// Signing key via the Edwards-to-Montgomery birational map).
enum KeyType {
    Unspecified         = 0;
    SymmetricKey        = 1;
    AsymmetricKey       = 2;    // Key agreement / encapsulation (X25519, ML-KEM)
    SigningKey          = 3;    // Signature (Ed25519, ML-DSA)
}

// CryptoKitID identifies an encryption suite that implements CryptoKit.
enum CryptoKitID {
    UnspecifiedKit      = 0;
    Poly25519           = 1;    //XChaCha20-Poly1305 symmetric, X25519 asymmetric, ED25519 signing
}

// HashKitID identifies a hash algorithm.
enum HashKitID {
    UnspecifiedHashKit = 0;
    SHA3_256           = 3;
    Blake2s_256        = 5;
}


// CryptOp enumerates cryptographic operations performed by an Enclave.
enum CryptOp {

    // Sign generates a signature for Input using the referenced signing key.
    Sign                            = 0;

    // EncryptSym encrypts Input using the symmetric key referenced by OpKey.
    EncryptSym                      = 1;

    // DecryptSym decrypts Input using the symmetric key referenced by OpKey (inverse of EncryptSym).
    DecryptSym                      = 2;

    // EncryptToPeer encrypts Input for a recipient identified by PeerKey using the asymmetric key referenced by OpKey.
    EncryptToPeer                   = 3;

    // DecryptFromPeer decrypts Input from a sender identified by PeerKey using the asymmetric key referenced by OpKey (inverse of EncryptToPeer).
    DecryptFromPeer                 = 4;
}


message CryptOpArgs {
    CryptOp     Op                  = 1;   // Which operation to invoke
    CryptoKitID DefaultKit          = 2;   // Fallback CryptoKit when not determined by OpKey
    bytes       Input               = 3;   // Input buffer (plaintext, ciphertext, or digest)
    KeyRef      OpKey               = 4;   // References a key used in the enclave for this op
    bytes       PeerKey             = 5;   // Recipient/sender pub key for asymmetric ops
}

message CryptOpOut {
    bytes       Output              = 1;    // Output buffer -- depends on the CryptOpArgs.Op
    bytes       OpPubKey            = 2;    // Pub key used in the op (useful when OpKey.PubKey was empty)
}


// KeyRef references a specific key within a KeyTome.
message KeyRef {
    fixed64     KeyringID_0         = 1;    // Keyring UID, bytes 0..7
    fixed64     KeyringID_1         = 2;    // Keyring UID, bytes 8..15
    bytes       PubKey              = 4;    // Pub key prefix (empty => newest key in the keyring)
}


// KeyPairRecord is the flat on-disk representation of a single key.
// The runtime layer uses the Go-native PubKey / KeyPair types; this proto exists
// only so KeyTome can be marshaled into a SealedTome.
message KeyPairRecord {
    fixed64     KeyringID_0         = 1;    // Keyring UID, bytes 0..7
    fixed64     KeyringID_1         = 2;    // Keyring UID, bytes 8..15
    CryptoKitID CryptoKitID         = 3;
    KeyType     KeyType             = 4;
    fixed64     TimeID_0            = 5;    // Time-based UID, bytes 0..7 (from tag.NowID)
    fixed64     TimeID_1            = 6;    // Time-based UID, bytes 8..15
    bytes       PubKey              = 7;    // Public part of the key (binary)
    bytes       PrvKey              = 8;    // Private key material (nil in public-only records)
}


// KeyTome is the root container for all keypair records.
// Persistence format only; the runtime indexes these in memory by (KeyringID, PubKey).
message KeyTome {
    int64                   Revision    = 1;    // Incremented on each mutation
    repeated KeyPairRecord  Keys        = 2;
}


// EpochKeyEntry stores a single symmetric epoch key for a planet or channel.
// Addressed by (ContainerID, EpochID) — both are tag.UIDs.
// EpochID is time-based (from tag.NowID), providing natural temporal ordering.
message EpochKeyEntry {
    fixed64             ContainerID_0   = 1;    // Planet or channel UID, bytes 0..7
    fixed64             ContainerID_1   = 2;    // Planet or channel UID, bytes 8..15
    fixed64             EpochID_0       = 3;    // Epoch UID, bytes 0..7 (time-based)
    fixed64             EpochID_1       = 4;    // Epoch UID, bytes 8..15
    CryptoKitID         CryptoKitID     = 5;    // Crypto suite for this epoch key
    bytes               Key             = 6;    // Symmetric key material (32 bytes)
}

// EpochKeyTome is the persistence format for all symmetric epoch keys.
// Sealed at rest using the same Guard/DEK mechanism as the identity KeyTome.
message EpochKeyTome {
    int64                   Revision    = 1;    // Incremented on each mutation
    repeated EpochKeyEntry  Keys        = 2;    // All epoch keys (sorted by ContainerID, then EpochID)
}


// EncryptedSymKey carries a symmetric key encrypted-to-peer for out-of-band delivery.
//
// Primary use cases:
//   - PlanetInvite: admin encrypts current epoch key for a new member's temp pub key
//   - Epoch rotation: current members receive the next epoch key encrypted to their pub key
//   - Any "here's a symmetric key for you" handoff between two known parties
//
// The receiver uses DecryptFrom(Ciphertext, SenderPubKey, receiver_prv_key) to recover the key.
message EncryptedSymKey {
    CryptoKitID CryptoKitID  = 1;    // Suite that encrypted this key (and must decrypt it)
    fixed64     EpochID_0    = 3;    // Epoch UID this key belongs to, bytes 0..7 (zero if not epoch-bound)
    fixed64     EpochID_1    = 4;    // Epoch UID this key belongs to, bytes 8..15
    bytes       SenderPubKey = 5;    // Pub key of the encryptor (required for DecryptFrom)
    bytes       Ciphertext   = 8;    // Output of CryptoKit.EncryptFor(symmetric_key, receiver_pub, sender_prv)
}