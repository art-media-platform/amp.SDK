syntax = "proto3";

// Package webapi defines the wire-level shapes for the amp /api/v1/* surface —
// the contract between amp web/native SDKs and an amp host (amp.exe).
//
// Field names MUST match the wire shape one-to-one — every external SDK
// (TypeScript, C#, Swift, future Python) reflects against these names.  JSON
// is encoded/decoded via protojson, which projects each proto field name to
// lowerCamelCase on the wire (Tag → "tag", BrandSnapshot → "brandSnapshot").
package webapi;

option csharp_namespace = "art.media.platform.webapi";
option go_package = "github.com/art-media-platform/amp.SDK/amp/webapi";

import "amp/amp.core.proto";


// PlanetCreateRequest is the body of POST /api/v1/admin/planet/create.
//
// Tag carries the planet's human-readable label — typically with Text set to
// a tag.Name expression ("tunr", "spaces.soundspectrum.com"), or with UID_0/1
// set for raw-UID input.  The endpoint creates planets with
// PlanetEpoch.IsPublic=true; per-member private planets are auto-genesisd by
// app.home on first login and don't need this surface.
//
// Brand is the founding Brand (PRD-name-service §2).  Optional — when omitted,
// the server synthesizes a minimal Brand{AppName: derived from Tag}.
message PlanetCreateRequest {
    amp.Tag             Tag   = 1;
    amp.Brand           Brand = 2;
}


// PlanetCreateResponse is the body of a successful planet create.
//
// PlanetID is the base32 UID of the new planet.  Tag mirrors the canonicalized
// form of the request's Tag so operators can verify the canonic / UID pair
// matches before persisting elsewhere.
message PlanetCreateResponse {
    string              PlanetID = 1;
    string              Tag      = 2;
    bool                Public   = 3;
}


// EmailCredential is the consolidated request body for the email-credential
// endpoints.  One shape, three endpoints — each consumes a subset of fields
// and ignores the rest.
//
//   POST /api/v1/admin/credentials/email/issue   Email + Password required
//   POST /api/v1/login/email/recover             Email required
//   POST /api/v1/login/email/redeem              Token + NewPassword required;
//                                                PlanetTag optional
//
// The endpoint validates field presence per its scheme.
message EmailCredential {
    string              Email       = 1;
    string              Password    = 2;
    string              Token       = 3;
    string              NewPassword = 4;
    string              PlanetTag   = 5;
}


// WithdrawNote is the wire-shape carrier for DESIGN-15 withdrawal facts.
// Used both in request-side TxOp (sender sets Reason/Rationale/Subject/
// Delegation; server fills WithdrawnAt/WithdrawnBy) and response-side
// alongside read Items / EditEntries (server populates all fields from the
// recorded withdrawal).
//
// Non-nil in a carrying message (TxOp.Withdraw, EditEntry.Withdraw, Item.
// Withdrawn, SubscribeFrame.Withdraw) marks the op/record as a withdrawal.
message WithdrawNote {
    amp.WithdrawReason  Reason       = 1;
    string              Rationale    = 2;
    amp.Tag             Subject      = 3;    // signer is implicit subject when nil
    amp.Address         Delegation   = 4;    // nil when Subject == signer
    string              WithdrawnAt  = 5;    // ISO-8601 (response-side; sender leaves empty)
    amp.Tag             WithdrawnBy  = 6;    // response-side; sender leaves empty
}
