syntax = "proto3";

// package amp is an implementation-independent API for a pluggable client-server UI/UX system,
// featuring support and integration for files, media, and communication.
//
// Welcome to art.media.platform (c) 2024 ("amp"): a runtime model and specification to securely share and experience digital media under their own agreed terms and permissions,
//   something we can all agree on.
package amp;

import "stdlib/safe/safe.proto";

// Tells protoc that a .proto file importing amp.proto what package import to use within Go.
option go_package = "github.com/art-media-platform/amp.SDK/amp";

option csharp_namespace = "art.media.platform";

// TxOpFlags are 8 available bit flags that describe a TxOp.
enum TxOpFlags {
    Unassigned = 0;    // invalid state
    MetaOp     = 0x01; // op is out of band and/or should not persist
    Upsert     = 0x04; // write value at [Address]
    Delete     = 0x08; // drop value at [Address]
}

// TxField maps a fixed count of int64 payload fields.
//
// Why not a proto message? Compression is much better since values usually repeat.
enum TxField {
    Nil = 0;

    NodeID_0 = 1;
    NodeID_1 = 2;

    AttrID_0 = 4;
    AttrID_1 = 5;

    ItemID_0 = 6;
    ItemID_1 = 7;

    EditID_0 = 10;
    EditID_1 = 11;

    MaxFields = 16;
}

// The first byte of a serialized proto.Message for future-proofing:
//
//    0x0F   which inline 16 byte (4 UID literals) that immediately follow
//    0xF0   flags that do not affect value header size.
//
enum ValueHeaderFlags {
    None = 0;

    FromID   = 0x01; // author or other originator
    TxID     = 0x02; // tx that publishes this entry
    UID_C    = 0x04; // reserved
    UID_D    = 0x08; // reserved

    // FromSelf = 0x10; // equivalent to FromID of owner (saves 16 bytes)
}

// TxEnvelope carries the cleartext routing/decryption fields of a tx; all
// other components (TxHeader, TxOps, datastore) are encrypted under the epoch
// the envelope names and are thus securely "within" the tx.
//
// INVARIANT: one TxMsg = one encryption context — a single Epoch field keys
// the whole payload, so every op must be readable by any holder of that epoch
// key.  To write under a different domain (e.g. another private channel),
// author a separate TxMsg.  (AOM ZO-design-conventions.md §3.3,
// SD-security-sync.md §3.)
//
// Epoch modes:
//   - nil/zero   → planet-public: plaintext, signed-only (governance ops).
//   - planet ID  → private planet: ops encrypted under the planet epoch key.
//   - channel ID → private channel: ops encrypted under that channel's key.
//
// FromID (author identity) lives inside the encrypted TxHeader so passive
// observers and relay vaults cannot correlate sender with traffic.
// (AOM ZO-design-conventions.md §3.4.)
message TxEnvelope {

    // Universally unique ID assigned when a tx is created
    fixed64             TxID_0 = 1;
    fixed64             TxID_1 = 2;

    // Which planet this tx should be applied to.
    Tag                 Planet = 6;

    // Which epoch (planet or channel) this tx was created within.
    // Determines which epoch keyring to use for encryption/decryption.
    // Works for both planet-level and channel-level encryption.
    // A single TxMsg is encrypted under exactly one epoch — never mixed.
    Tag                 Epoch = 7;

    // Byte offset from the end of the marshalled TxEnvelope to the start of the TxHeader.
    uint64              HeaderOffset = 10;

    // Proves sender is a planet/channel member without revealing identity, so
    // relay vaults can reject spam without decrypting content.
    // (AOM SD-security-sync.md §3.6.)
    bytes               MemberProof = 25;

    // Planet epoch UID active when this tx was sealed.  For channel-encrypted
    // txs it keys the role-specific derived keys: ReadOnly+ holds ContentKey,
    // ReadWrite+ also holds WriteSeed (see safe.KeyRole), so members without
    // WriteSeed cannot forge a MemberProof — write access is cryptographic.
    // Rotating the planet epoch invalidates channel-derived keys even if the
    // channel epoch has not rotated.  Zero/omitted for planet-encrypted txs.
    // (AOM SD-security-sync.md §3.6.)
    fixed64             PlanetEpoch_0 = 30;
    fixed64             PlanetEpoch_1 = 31;

}

// TxHeader contains primary information about a tx and is encrypted based on TxEnvelope fields.
message TxHeader {

    // Refers to a tag ID (usually a TxID) for subsequent requests and responses.
    // Used to reference a tx thread to a request.
    // If nil or equal to TxID, then this tx is context-free and TxID is implied context ID.
    fixed64             ContextID_0 = 1;
    fixed64             ContextID_1 = 2;

    // Author identity — moved from TxEnvelope into encrypted payload
    // so passive observers cannot correlate sender identity with traffic.
    fixed64             FromID_0 = 3;
    fixed64             FromID_1 = 4;

    // Status of the most recent PinRequest revision.
    PinStatus           Status = 7;

    // Number of TxOps in this tx.
    uint64              OpCount = 10;

    // If set, updates the active PinRequest state.
    PinRequest          Request = 12;

}



// Expresses the status of an amp.Pin.
enum PinStatus {
    Inactive = 0;  // no op
    Started  = 2;  // pin now on service
    TxCommit = 6;  // tx commit complete / failed
    Syncing  = 8;  // state sync in progress
    Synced   = 9;  // state is synchronized; drives UI updates requiring a stable state.
    Complete = 16; // pin complete / closed / failed
}


// Login -- STEP 1: client -> host
message Login {

    Tag                Member = 1;
    Tag                Planet = 2;
    Tag                Device = 5;

    // HostAddress is the network address of the server known to the client (e.g. IP address, localhost, domain name, etc)
    // amp.Host uses this as the host name when serving URLs for the client to consume.
    string             HostAddress = 8;

    // Checkpoint allows the client to resume an auth session.
    LoginCheckpoint    Checkpoint = 12;

    // SigningPubKey carries the client's raw signing public key so a remotely
    // self-generated identity can be bound to a Member.  The host verifies the
    // challenge-response signature against the key it holds for Member; when the
    // host has no key recorded yet it may adopt this one if trust-on-first-use (TOFU)
    // is set.
    bytes              SigningPubKey        = 14;
    fixed64            SigningCryptoKitID_0 = 15;   // Client's signing-suite UID, bytes 0..7
    fixed64            SigningCryptoKitID_1 = 16;   // Client's signing-suite UID, bytes 8..15

}

// LoginChallenge -- STEP 2: host -> client
message LoginChallenge {
    bytes               Hash = 1;
}

// LoginResponse -- STEP 3: client -> host
message LoginResponse {
    bytes               HashResponse = 1;
}

// LoginCheckpoint wraps oauth2 -- see oauth2.Token
message LoginCheckpoint {
    string              TokenType    = 1;
    string              AccessToken  = 2;
    string              RefreshToken = 3;
    int64               Expiry       = 4; // unix UTC seconds

    string              UserID = 11;
    string              URI    = 12;
}

// PinRequest is a peer request to "pin" a set of element IDs, where selected attrs and items will be pushed to the peer.
message PinRequest {

    // Used for easy sorting and ordering of requests
    //    0: initial request
    //    1: 1st revision
    //    2: 2nd revision ...
    int64               Revision = 1;

    // Operation mode for this pin request.
    PinMode             Mode = 2;

    // Explicit URL or ID invocation associated with this request.
    string              URL = 4;

    // Selects which values to synchronize and which NOT to synchronize.
    ItemSelector        Selector = 6;

    // If set, requests a preferred tx byte size limit.
    int64               PreferredTxSize = 7;
}


// Expresses an easy to use set of address ranges.
message ItemSelector {
    repeated ItemSpan Spans      = 1;
    bool              Normalized = 2;
}

// Expresses an ItemID range for a given NodeID.
message ItemSpan {

    fixed64  NodeID_0 = 3; // channel node or wildcard
    fixed64  NodeID_1 = 4; // "

    fixed64  AttrID_0 = 6; // attr ID or wildcard
    fixed64  AttrID_1 = 7; // "

    fixed64  ItemID_Min_0 = 10; // min ItemID (inclusive)
    fixed64  ItemID_Min_1 = 11; // "
    fixed64  ItemID_Max_0 = 12; // max ItemID (inclusive)
    fixed64  ItemID_Max_1 = 13; // "

    int64    ItemsPerAttr = 14; // max items returned per unique attr ID (0 denotes no limit)
    int64    EditsPerItem = 15; // max edits returned per unique item ID
}



// Determines how much a Pin emits to its client Requester.
enum PinMode {

    // If set, no state is emitted to the client.
    // Used when only writing via CommitTx()
    Commit = 0;

    // Send requested attrs, then auto-close this request
    // Used when instantaneous state is sufficient (e.g. applying a setting)
    Snapshot = 1;

    // If set, the request will remain open after the initial state snapshot is sent.
    // Requester will receive state updates until this request is closed.
    MaintainSync = 2;
}





enum UriScheme {
    Unspecified = 0;

    Http     = 5;  // "http:/..."
    Https    = 6;  // "https:/..."
    Data     = 7;  // "data:{mime-type}[[;base64],{data-encoding}]"
    File     = 9;  // "file:/{hfs-pathname}"

    Asset     = 15; // "asset:({tag.name} | //{domain_name}/{crate.name}/{asset.name})
    AppNative = 16; // "[[{app_scheme}://planet.or.domain_name/]{verb}/]{query}"
}

// Tag is a versatile and lightweight way to fuse any URL, ID, precise geo-location, crypto address, content-type, or payload text.
//
// All fields are optional and their meaning is contextual.
message Tag {

    /// open-use inline fields; typical encoded size is 10-20 bytes, max possible size is 170 bytes
    ///
    fixed64 UID_0 = 3;
    fixed64 UID_1 = 4;

    int64   I     = 16;
    int64   J     = 17;
    int64   K     = 18;
    Units   Units = 21; // units for (i,j,k)

    /// open-use non-inline fields
    ///
    string  ContentTypeRaw = 24; // IANA media type; access via Tag.ContentType() e.g. "text/html", "image/png", "image/*", "amp.vis/content.*"
    string  URI            = 26; // IANA RFC 1738 URL or unix pathname
    string  Text           = 28; // UTF8 plain-text, XML, RTF
}


// Tags is a multi-purpose, serializable, and customizable tree of tags.
//
// All fields are optional and their meaning is contextual.
message Tags {
    Tag           Head     = 1; // identifies this branch
    repeated Tag  SubTags  = 4; // amplifying attributes or values
    repeated Tags Children = 6; // sequential sub trees
}


// Units specifies a standard units convention.
enum Units {
    Unitless    = 0;  // units not specified
    Operations  = 1;  // total operation count
    Bytes       = 2;  // any byte offset
    Pixels      = 3;  // texels or device pixels; not for typographic sizes
    Seconds     = 4;  // elapsed time
    Planck      = 5;  // Planck length
    Samples     = 6;  // one media sample (e.g. an audio frame); rate is samples per second
    BitrateKbps = 7;  // kilobits per second (1000 bits/s)
    Nanometers  = 8;  // 10^9 nm == 1 m
    Millimeters = 10; // 10^3 mm == 1 m; 1 point == 1/72 inches == 0.3527777778 mm
    Meters      = 11; // length for humans
    LightYears  = 16; // 1 light year == 9460730472580800. meters
}




// Access levels ordered by privilege (higher = more access).
enum Access {
    NotAllowed = 0;
    Invite     = 1;    // Can see the channel exists and invite others
    Private    = 3;    // Can see metadata but not content
    ReadOnly   = 4;    // Can read content
    ReadWrite  = 6;    // Can read and write
    Moderator  = 8;    // Can approve, withdraw, and hide content and file authoritative Strikes — but not manage grants or keys
    Admin      = 10;   // Full control: create sub-channels, manage access
}

// AccessGrant maps a member (or default, if MemberTag is nil) to an Access level.
message AccessGrant {
    Tag                 MemberTag = 1; // Member identity (nil = default grant)
    Access              Access    = 2;
}

// AccessGrants is a set of per-member access grants.
message AccessGrants {
    repeated AccessGrant Grants = 1;
}

// ContentPolicy constrains HOW a channel's content cells may be written — orthogonal
// to the AccessGrants axis, which gates WHO may write.  Default Unbound keeps classic
// semantics (any Access_ReadWrite holder writes any cell on the node).  AuthorBound
// restricts a non-moderator writer to cells whose ItemID is bound to their own
// identity, so members self-author on one shared channel without being able to
// overwrite another member's cell (AOM SD-channel-governance.md §4).
enum ContentPolicy {
    Unbound     = 0; // any Access_ReadWrite holder may write any cell on the node
    AuthorBound = 1; // a non-moderator writer may write only cells bound to their own identity
}

// Governing unit of amp channel permissions and security.
message ChannelEpoch {
    Tag                 Channel = 1; // channel this record applies to
    Tag                 Parent  = 2; // parent legislating channel whose grants are inherited; if nil, Channel legislates itself
    Tag                 ChType  = 6; // channel type name and/or ID
    ContentPolicy       ContentPolicy = 7; // how content cells may be written (orthogonal to the grants axis)

    string              Label     = 10; // debugging
    string              LegacyURI = 11;

    // Per-member permissions for this channel (or ACC).
    AccessGrants        MemberGrants  = 20;

    // Default permissions for members not listed in MemberGrants.
    AccessGrants        DefaultGrants = 21;

    // Attestations cited as the basis for this grant — votes, audits, witness
    // records, or prior epochs that informed the access decision, making every
    // governance act reviewable and appealable.  Empty for routine grants.
    // Informational: protocol does not gate access on Cites.  Mirrors
    // MemberEpoch.Cites.  AttrID and EditID may be left zero when citing an item
    // rather than a specific edit (the common case).
    repeated Address    Cites = 22;
}


// BlobRef is a content-addressed reference to a media blob stored outside a TxMsg.
// It binds two content addresses: AssetTag names WHAT the content is (the plaintext
// identity), BlobTag names HOW its bytes are stored (the on-disk / on-wire identity).
// For a planet-public blob the stored bytes are the plaintext, so BlobTag.UID ==
// AssetTag.UID; for an epoch-sealed blob the stored bytes are ciphertext, so the two
// diverge and EpochID is set.  A relay routes, stores, and integrity-checks against
// BlobTag without decrypting or learning the asset; AssetTag stays member-side.
message BlobRef {

    // Planet this blob belongs to.
    fixed64             PlanetID_0 = 1;
    fixed64             PlanetID_1 = 2;

    // Hash algorithm used for blob integrity (default: Blake2s_256).
    // Each BlobRef is self-describing — the validator reads this field
    // to select the correct HashKit for verification.
    safe.HashKitID      HashKitID = 8;

    // HashKit digest of the PLAINTEXT blob content (4 x fixed64 = 32 bytes).
    // This is the asset's full hash; AssetTag.UID is its leading 16 bytes.  Lets a
    // member validate content after decryption regardless of how it was stored.
    fixed64             Hash_0 = 10;
    fixed64             Hash_1 = 11;
    fixed64             Hash_2 = 12;
    fixed64             Hash_3 = 13;

    // WHAT it is — the plaintext asset identity.  Member-side.
    //   AssetTag.UID         — leading 16 bytes of the plaintext hash (Hash_0..3).
    //   AssetTag.ContentType — MIME type (e.g. "image/jpeg", "audio/mpeg").
    //   AssetTag.Text        — caller-supplied label (e.g. the source file name).
    //   AssetTag.I (Units=Bytes) — authoritative plaintext byte length.
    Tag                 AssetTag = 16;

    // HOW it is stored — the on-disk / on-wire byte identity.  Lean, relay-facing.
    //   BlobTag.UID         — leading 16 bytes of hash(stored bytes): ciphertext for a
    //                         sealed blob, == AssetTag.UID for a planet-public one.
    //   BlobTag.I (Units=Bytes) — stored byte length.  No ContentType / label.
    Tag                 BlobTag = 17;

    // Epoch key used to seal this blob (zero = unsealed / planet-public ⇒ BlobTag.UID == AssetTag.UID).
    // Receivers look up the key via (planetID, epochID) in the EpochKeyStore.
    fixed64             EpochID_0 = 20;
    fixed64             EpochID_1 = 21;
}


// PlanetStorageOpts configures per-planet storage priority and budgets.
// Stored as a home planet attribute alongside PlanetBinding, keyed by planet UID.
// Drives cache eviction: lower-priority planets have their decrypted cache evicted first.
message PlanetStorageOpts {

    // Storage priority (higher = more important, 0 = default).
    // Drives cache eviction ordering: lowest-priority planets evicted first.
    int32               Priority = 1;

    // Max encrypted blob storage for this planet in bytes (0 = unlimited).
    int64               MaxBlobBytes = 2;

    // Max decrypted cache for this planet in bytes (0 = unlimited).
    int64               MaxCacheBytes = 3;
}


// VaultConfig bundles the per-planet workload tunables that relay vaults enforce.
// All fields are advisory — unset (zero) means "use the protocol default" from
// amp.support.attrs.go DefaultXxx consts.  Passed around as *VaultConfig; helpers
// on the pointer receiver are nil-safe so callers don't have to guard.
message VaultConfig {

    // Rate limiting (per-member, sliding window):
    int64   MaxTxMsgSize         = 1;   // Max single TxMsg bytes (default: 1 MB)
    int64   MaxBytesPerWindow    = 2;   // Max bytes per member per window (default: 100 MB)
    int64   MaxTxPerWindow       = 3;   // Max TxMsg count per member per window (default: 10000)
    int64   RateLimitWindowSecs  = 4;   // Sliding window duration in seconds (default: 86400 = 24h)

    // Quarantine retention for TxMsgs that fail MemberProof or signature verification.
    // Quarantined entries are excluded from fanout + ReadSince but remain in the journal
    // so Strike attestations citing the rejected TxID can be audited against the bytes.
    // After expiry, Badger GC evicts; the Strike still stands (canonical bytes include TxID).
    // If 0, DefaultQuarantineRetention applies (7 days).
    int64   QuarantineRetentionSecs = 5;

    // Maximum seconds a TxMsg's TxID timestamp may exceed the receiving vault's wall clock.
    // TxMsgs stamped further into the future are dropped at intake.  Past-stamped TxMsgs
    // are unrestricted (catchup/resync).  If 0, DefaultMaxFutureSkew applies (5 minutes).
    int64   MaxFutureSkewSecs = 6;

    // Late-key pending queue caps.  Bound memory used tracking encrypted TxMsgs awaiting
    // their epoch key.  Saturation is not data loss — entries remain in the journal and
    // are decryptable when the key arrives; saturation just skips the audit-drain re-verify.
    // If 0, the DefaultMaxPendingPerEpoch / DefaultMaxPendingEpochs apply.
    uint32  MaxPendingPerEpoch = 7;
    uint32  MaxPendingEpochs   = 8;

    // Bootstrap TTL for invite tokens, in seconds.  An invite created at time T is
    // accepted only while time.Now().Unix() <= T + BootstrapTTLSecs.  Bounds the
    // exposure window of a leaked invite token.  Enforced on accept; the issuing
    // admin cannot retract early but may publish an explicit revocation op.
    // If 0, DefaultBootstrapTTL applies (7 days).
    int64   BootstrapTTLSecs = 9;

    // Blob-plane metering (per-peer, sliding window).  Bounds the byte volume a
    // single authenticated peer can drive through the blob transfer plane — charged
    // at both ingest (StoreValidated) and egress (SendBlob) — so a misbehaving peer
    // cannot force unbounded hash+write or disk-read+send work.  The unsolicited-push
    // ingest gate (accept only referenced blobs) is the precise first line; this
    // budget is the coarse backstop and the only bound on the egress side.  Sized for
    // large-media sync: the default is generous so legitimate transfers pass, and a
    // hostile-environment operator tightens it.  If 0, DefaultMaxBlobBytesPerWindow
    // applies (1 TiB).
    int64   MaxBlobBytesPerWindow = 10;

    // Sliding window for the blob byte budget, in seconds.  The blob plane moves
    // large media on a slower cadence than the TxMsg plane, so it may want its own
    // window.  If 0, RateLimitWindowSecs is used; if that is also 0,
    // DefaultBlobRateLimitWindow applies (24h).
    int64   BlobRateLimitWindowSecs = 11;

    // Per-object blob size ceiling: the maximum stored byte size of a SINGLE blob this vault will
    // ingest, distinct from the per-window byte budget above.  Bounds the otherwise 1 PiB-declarable
    // transfer the sliding-window budget alone admits.  If 0, DefaultMaxBlobBytesPerObject applies
    // (1 TiB).
    int64   MaxBlobBytesPerObject = 13;

    // Bootstrap vault endpoints advertised for this planet — the admin-signed,
    // governance home for "where can a fresh peer dial to reach this planet?".
    // InviteCreate stamps these into every PlanetInvite it issues, so a peerless
    // acceptor can DialVaultPeers its way onto the planet.  Reuses the transport-
    // tagged VaultAddr envelope shared with NameServiceRecord / FederationPeer.
    // Empty means the planet publishes no bootstrap address (reachable only via a
    // federation NameServiceRecord or static -vault.peers).
    repeated VaultAddr VaultAddrs = 12;
}


// SealState is the planet's lifecycle posture as asserted by the signing quorum
// of one epoch (it lives in EpochTerms, never a top-level admin field, because
// pausing or terminating a planet is a governance act).
enum SealState {
    Open   = 0; // live: normal read/write under this epoch
    Paused = 1; // write-frozen, but a later quorum epoch (Open) may resume
    Sealed = 2; // permanently sealed: no successor epoch chaining off this one is valid
}


// BrandMark is a planet's QUORUM-SIGNED public identity — the impersonation
// surface.  It is embedded in EpochTerms (quorum-signed), NOT the admin-mutable
// Brand attr, so changing a planet's public face requires convening the
// governing quorum.  This is the anti-spoof boundary: a lone admin key cannot
// silently rename "Pentagon" to "Mercenaries of Death".
//
// The separate Brand attr remains the admin-mutable record for NON-identity,
// cosmetic/operational fields (home URLs, link lists, install targets, and the
// content-addressed BundledCrates SBOM — hash-pinned + change-logged).  When the
// two disagree, BrandMark (here, quorum-signed) is the authoritative identity.
message BrandMark {

    // Public name of the planet ("Tunr", "Pentagon", "The Martinez treehouse").
    // The canonical display name; renaming requires the quorum.
    string              AppName = 1;

    // Operator / sponsoring organization name ("SoundSpectrum").
    string              OrgName = 2;

    // Canonical domain the planet presents as ("spaces.soundspectrum.com").
    // A domain claim is part of the impersonation surface, so it is quorum-signed.
    string              AppDomain = 3;

    // Human-readable description of the planet.
    string              AppDesc = 4;

    // Deep-link / custom URL schemes this planet answers to (["tunr"]).  Quorum
    // -signed because a scheme claim is an identity / impersonation surface.
    repeated string     URLSchemes = 5;

    // The federation that names this planet — the AOM DD-name-service.md §3.3 back-edge
    // the planet acknowledges as its current namer.  Single-valued (one namer at
    // a time, may roam).  Quorum-signed so federation affiliation cannot be spoofed.
    Tag                 NamedBy = 6;

    // Visual glyph variants (HTML <picture>-shaped Tags tree): size/theme/density/
    // content-type variants consumers pick from.  The visual impersonation
    // surface, hence quorum-signed.
    Tags                Glyphs = 7;
}


// PrivacyMode is a planet's lifetime-fixed payload-confidentiality posture, set
// at genesis in PlanetCharter and never changed (a planet that wants to switch
// forks instead).  Confidential and Public are the endpoints; the reserved 1–6
// gap leaves room for graduated intermediate modes without disturbing them.
enum PrivacyMode {
    Confidential = 0; // members-only: payloads are encrypted; only members author and view
    Public       = 7; // signature-only: no payload encryption; anyone may syndicate/view, only members author
}


// PlanetCharter holds a planet's lifetime-IMMUTABLE founding terms.  It is
// marshaled exactly once at genesis, stored verbatim in PlanetEpoch.Charter, and
// carried byte-identically on every epoch for the planet's whole life.
//
// FREEZE INVARIANT: the Charter bytes are signed verbatim (see PlanetEpoch).  A
// verifier hashes the STORED bytes and never re-marshals this message, so
// cross-language proto-determinism is irrelevant to authority.  Field numbers
// are still frozen so READERS across languages agree on field meaning; the
// message grows additively (new fields take the next free number).
message PlanetCharter {

    // Layout version of this Charter.  1 at the v250 freeze.  A future
    // incompatible layout (should never happen post-freeze) increments this so a
    // reader refuses rather than misparses.
    uint32              CharterSchema = 1;

    // Permanent identity of the planet itself (not the epoch).  Equals the
    // genesis planet UID.  Binds the Charter bytes to one planet so a Charter
    // cannot be lifted and replayed onto another planet's chain.
    Tag                 PlanetID = 2;

    // Genesis epoch identity (== the first EpochTerms.EpochTag).  Anchors the
    // root of the epoch chain inside the immutable layer.
    Tag                 GenesisEpoch = 3;

    // Containment hierarchy: the parent planet this one was founded under.
    // Genesis-immutable — a planet's place in the parent/child tree is a founding
    // fact, not a governance toggle.  Nil for a root planet.
    Tag                 ParentPlanet = 4;

    // Forward-only fork provenance: the planet this one was forked from, the
    // source epoch, and fork time.  Carries no authority over this planet.
    // Immutable because "where we came from" is a founding fact.  Nil for an
    // original (non-forked) planet.
    PlanetOrigin        Origin = 5;

    // Privacy mode, fixed for the planet's life.  Public operates signature-only
    // with no payload encryption (anyone may syndicate/view, only members author);
    // Confidential encrypts payloads to members.  Changing it would retroactively
    // re-classify all prior content — a Confidential planet that wants to go Public
    // forks instead.
    PrivacyMode         Privacy = 6;

    // Founding declaration of intent — the vows, operating clause, house rules the
    // founders read and signed.  Structured (Tags) so founding terms are machine-
    // walkable: Head names the covenant; SubTags/Children carry clauses,
    // jurisdiction, language variants, signed riders.  Immutable: the declaration
    // each founder bound themselves to cannot be edited after.
    Tags                Declaration = 7;

    // Founding member set, by UID.  Genesis is self-ratifying: each founder
    // co-signs Charter+Terms bytes that include this list, and their signing
    // pubkeys ride the genesis TxMsg's MemberEpoch ops.  An explicit UID set (not
    // a GovernanceGroup reference) avoids any chicken-and-egg at founding — a group
    // cannot be cited before the planet that defines it exists.
    repeated Tag        Founders = 8;

    // Genesis quorum threshold: how many Founders must have validly co-signed the
    // genesis epoch.  0 = all Founders (paranoid default).  Frozen: the rule under
    // which the planet legitimately came into being cannot be restated.
    int32               GenesisRequiredSignatures = 9;
}


// EpochTerms holds a planet's per-epoch GOVERNANCE terms.  Each epoch rotation
// produces a fresh EpochTerms, marshaled once and stored verbatim in
// PlanetEpoch.Terms, then co-signed by the governing quorum.  Verifiers hash the
// STORED bytes; this message is never re-marshaled on the verify path.
//
// Everything here is quorum-signed.  In particular the planet's public identity
// (Mark) lives here so a spoof rename requires convening the quorum, not a lone
// admin write.  Non-identity Brand fields (home URLs, links, install targets,
// hash-pinned BundledCrates) stay on the admin-mutable Brand attr.
message EpochTerms {

    // Layout version of this EpochTerms.  1 at the v250 freeze.
    uint32              TermsSchema = 1;

    // Identity of this epoch (time-ordered UID).  Matches PlanetEpoch.EpochTag and
    // every MemberEpoch.Epoch published alongside it.
    Tag                 EpochTag = 2;

    // The epoch this one supersedes, forming the authority chain.  Nil ONLY for
    // the genesis epoch.  A verifier walks this back to PlanetCharter.GenesisEpoch.
    Tag                 PreviousEpoch = 3;

    // Monotonic epoch height: genesis = 0, each rotation + 1.  A clock-independent
    // total order (UIDs encode wall-clock, which a malicious minter could skew);
    // lets verifiers reject out-of-order / replayed epochs and bound chain length.
    uint64              EpochHeight = 4;

    // HashKit is this epoch's content/digest hash policy — per-epoch and
    // rotatable (a migration may move it alongside CryptoKitID), selected by ID
    // so a verifier picks the hasher rather than hardcoding an algorithm.
    // CharterHash is the digest of the planet's immutable PlanetCharter bytes
    // under HashKit: it binds every epoch to the one Charter so a charter swap is
    // detectable from the small Terms alone, without re-shipping Charter bytes.
    safe.HashKitID      HashKit = 5;
    bytes               CharterHash = 6;

    // Crypto suite in force for this epoch — the SOLE home for the planet's suite
    // (no separate founding-kit slot; the genesis epoch's value IS the founding
    // suite).  Unset resolves to Poly25519 via EffectiveCryptoKit.  A quorum-
    // approved migration (e.g. post-quantum) rotates the suite by issuing an epoch
    // with a new value.
    fixed64             CryptoKitID_0 = 7;    // CryptoKit UID (suite in force this epoch), bytes 0..7
    fixed64             CryptoKitID_1 = 8;    // CryptoKit UID, bytes 8..15

    // Human-readable label for THIS epoch ("Genesis", "Rotation 3") — an operator/
    // audit display string, NOT the planet's public name (that is Mark.AppName).
    string              Label = 10;

    // The planet's quorum-signed public identity (name/org/domain/description/URL
    // schemes/federation back-edge/glyphs).  The impersonation surface — here, not
    // the admin-mutable Brand attr, so a public-face change requires the quorum.
    BrandMark           Mark = 11;

    // Default entry channel — where members land when opening the planet.
    // Foyer is to play as Index is to search.
    Tag                 Foyer = 12;

    // Public-facing node enumerating discoverable channels / content.
    Tag                 Index = 13;

    // The ACC group whose members are the authorized co-signers of this epoch.
    // Zero/unset for genesis (the signers are PlanetCharter.Founders directly);
    // for rotations, resolves to a group defined in the prior epoch's member set.
    Tag                 GovernanceGroup = 16;

    // Threshold of GovernanceGroup co-signatures required for this epoch to be
    // valid.  0 = all members of the resolved group (paranoid default).
    int32               RequiredSignatures = 18;

    // Lifecycle posture asserted by this epoch's quorum (Open / Paused / Sealed).
    SealState           Seal = 20;

    // Address of the immutable Codex edition this epoch publishes / seals against
    // ("the printed edition").  Typically set on a Paused/Sealed sealing epoch.
    // Zero when this epoch publishes no edition.
    Address             CodexEdition = 22;

    // Vault workload tunables (rate limits, quarantine retention, intake guards,
    // pending-queue caps).  Quorum-signed so an operator cannot unilaterally loosen
    // them.  Null-safe: unset fields fall back to the DefaultXxx consts.
    VaultConfig         VaultConfig = 25;

    // Seconds after rotation during which old-epoch TxMsgs are still accepted
    // (offline / mesh authors).  If 0, DefaultGracePeriod is used.
    int64               MaxGracePeriod = 32;
}


// PlanetEpoch is the envelope published in the root ACC channel (HeadNodeID) to
// establish or rotate a planet epoch.  It carries two verbatim-signed sub-
// structures — the immutable Charter and this epoch's Terms — the quorum co-
// signatures over them, the non-voting witnesses, and unsigned runtime fields.
//
// SIGNED PAYLOAD (the FRAME each CoSignature covers), reconstructed from the
// STORED bytes and never from a re-marshal:
//
//     u64BE(len Charter) || Charter || u64BE(len Terms) || Terms
//
// No protobuf library is needed to reproduce the FRAME: it is three universal
// operations (byte length, big-endian uint64, concatenation) over two opaque
// blobs that were each marshaled exactly once at authoring time.  The u64
// big-endian length prefixes make the Charter/Terms boundary unforgeable and
// additive-safe forever (a byte cannot be shifted across the boundary without
// changing a length).  Layout evolution is signaled in-band by the signed
// CharterSchema / TermsSchema fields, so the FRAME itself carries no magic or
// version tag.
message PlanetEpoch {

    // Verbatim PlanetCharter bytes — marshaled once at genesis and carried byte-
    // identically on EVERY epoch (self-contained; a single epoch is fully
    // verifiable offline without fetching genesis).  First half of the FRAME.
    bytes               Charter = 1;

    // Verbatim EpochTerms bytes for THIS epoch.  Second half of the FRAME.
    bytes               Terms = 2;

    // Advisory denormalized copy of EpochTerms.EpochTag, in the clear so vaults and
    // routers can index/address (HeadNodeID, LawPlanetEpoch, EpochTag) without
    // parsing Terms.  UNSIGNED: verifiers MUST treat the value inside Terms as
    // authoritative and reject a mismatch.
    Tag                 EpochTag = 3;

    // Quorum co-signatures over the FRAME.  Each signer's CryptoKit is resolved via
    // MemberTag -> MemberEpoch, enabling mixed-suite quorums.  Excluded from the
    // FRAME so signers append incrementally.
    repeated CoSignature Signatures = 4;

    // Non-voting attestors (notary, officiant, friend, auditor, AI monitor) signing
    // the SAME FRAME as Signatures, distinguished by slice not by form.  Excluded
    // from the FRAME so witnesses can be added after-the-fact.
    repeated CoSignature Witnesses = 5;

    // Host-only runtime flag, NEVER signed and NEVER announced: if true, this planet
    // is local to one host (the vault refuses to announce it, rejects remote claims,
    // and skips it in watch-list exchanges).  A per-host deployment fact — two hosts
    // may legitimately disagree — so it lives outside the signed Charter/Terms.
    bool                LocalOnly = 6;
}


// CoSignature is one member's signature contribution to a multi-sig epoch.
// Used for Planet genesis (Founders) and for epoch rotation under M-of-N governance.
message CoSignature {

    // The signing member. Their CryptoKitID is resolved via MemberEpoch,
    // allowing each co-signer to use their preferred crypto suite.
    Tag                 MemberTag = 1;

    // Raw signature bytes, interpreted per the signer's CryptoKitID.
    bytes               Signature = 2;
}


// MemberStatus is the member's lifecycle state as of this MemberEpoch.
// Transitions are one-way: Active → Suspended → Revoked.  Suspended is a
// reversible pause (e.g. key rotation pending).  Revoked is permanent and
// starts the MaxGracePeriod clock after which the member's signatures are
// no longer accepted.
enum MemberStatus {
    Active    = 0;
    Suspended = 1;
    Revoked   = 2;
}


// WrappedKey carries one role-tagged symmetric key, sealed to a specific member's
// EncryptKey via anonymous-sender ECDH+AEAD (safe.SealFor).  A MemberEpoch
// publishes one WrappedKey per role the recipient is authorized for (up to 4
// roles per epoch — see safe.KeyRole).
//
// Planet scope: one entry with Role=ContentKey (the planet content key).
// Channel scope: one entry with Role=ContentKey (for ReadOnly+), and if ReadWrite+,
// a second entry with Role=WriteSeed.
//
// Invariant: symmetric key material only.  Asymmetric private keys never ride
// this channel — they live in Enclave and are distributed (if at all) via
// Enclave-to-Enclave transfer, not MemberEpoch.
//
// The wrap is anonymous-sender; the ephemeral sender pubkey is embedded in
// Encrypted per the recipient kit's wire format.  Recipient decrypts with
// safe.Enclave.OpenFromPub using only their EncryptKey.
message WrappedKey {
    safe.KeyRole        Role      = 1;    // which role this key material serves

    // Role key sealed to the member's EncryptKey via safe.SealFor.
    bytes               Encrypted = 2;
}

// MemberEpoch delivers epoch-scoped key material and status for one member on one node.
// Node = planet head (amp.HeadNodeID) for planet-level records, channel UID for channel records.
// Published as an op in the ACC channel by the node's admin when:
//   - The node's epoch rotates (fresh keys for all members)
//   - A member is added / removed / changed
//
// WrappedKeys are access-tiered: ReadOnly+ members receive Role=Content; ReadWrite+
// additionally receive Role=WriteSeed.  The WriteSeed is the substrate for MemberProof
// HMAC, so members without it cannot forge write proofs — the vault's enforcement of
// channel ACC becomes cryptographic rather than policy-based.
message MemberEpoch {

    // Member identity (recipient of the wrapped keys).
    Tag                 MemberTag = 1;

    // Node this epoch record applies to — planet head for planet-level, channel UID otherwise.
    Tag                 Node = 3;

    // Epoch this entry belongs to (planet epoch or channel epoch).
    // Must match PlanetEpoch.EpochTag / ChannelEpoch.Epoch so recipients store keys under the correct ID.
    Tag                 Epoch = 2;

    // Role-tagged wrapped keys, encrypted to the recipient via EncryptToPeer.
    // Empty for Revoked/Suspended records.
    repeated WrappedKey WrappedKeys = 30;

    // Lifecycle state as of this MemberEpoch.  Meaningful at planet scope; reserved at channel scope.
    MemberStatus        Status = 8;

    // Member's identity SigningKey — pubkey + kit, used for signature
    // verification.  Lives in the member's chosen kit (may be hardware-bound).
    safe.KeyRef         SigningKey = 12;

    // Member's planet-encrypt key — pubkey + kit, receives anonymous-sender
    // wraps of epoch keys.  Lives in the member's chosen CryptoKit; the wrap
    // generates an ephemeral keypair in this kit per call, so no kit
    // coordination between admin and member is needed.  Members may rotate
    // this key independently of any planet-wide cadence.
    safe.KeyRef         EncryptKey = 32;

    // Citations referenced as the basis for this epoch.  For suspensions and
    // revocations, these point to ledger entries (strikes, audits, witness records)
    // that informed the decision — making every governance act reviewable and
    // appealable.  Empty for routine epochs (e.g. initial Active, key rotation).
    // AttrID and EditID may be left zero when citing an item rather than a
    // specific edit (the common case).
    repeated Address    Cites = 20;

    // Substrate-agnostic Kind, addressed by Tag.  The Tag's UID resolves to a
    // LawMemberKind_* definition in amp.consts.sdl (or any community/app's
    // consts).  Zero UID = unspecified.  Protocol does not gate behavior on
    // Kind — it is a label for downstream readers (UI, governance, ledger
    // filters), not a privilege class.  See AOM SD-security-sync.md §5.
    Tag                 Kind = 33;

    // Self-signed claim of identity continuation from prior identities.
    // Cross-planet citations supported (and typical) — a being's lineage
    // often spans planets (personal → family-of-origin → cultural → spiritual).
    // The claim is the member's own; the protocol records, communities decide
    // what weight to honor.  Multiple cites express composite lineage
    // (ensembles descending from multiple prior identities; AI agents trained
    // on multiple ancestor chronicles; reconstituted backups).
    repeated Address    ContinuesFrom = 34;
}


// AttestationType names the kind of observation being recorded in the planet ledger.
// Apps may use values above 100 for domain-specific types; 0-99 are reserved.
enum AttestationType {
    NotSpecified       = 0;
    Strike             = 1;  // ACC violation observed
    Endorsement        = 2;  // positive observation (clean cosign, delivery, etc.)
    Witness            = 3;  // witnessed an event (for dispute resolution)
    Audit              = 4;  // decision record — what a choice was based on
    Amnesty            = 5;  // reverses a prior attestation (admin action)
}


// Attestation is a durable observation referencing a specific TxMsg as evidence.
// Attestations live in the planet ledger (well-known channel amp.ledger) and are
// written as ordinary TxOps — signed, synced, and journaled by the vault machinery.
//
// Convergence: independent observers of the same fact compute the same ItemID
// (derived from Type + Subject + CitedTxID + CitedOpIndex), so their filings CRDT-merge
// into a single record rather than N duplicates.
//
// Attestations INFORM decisions; they do not execute them.  Admin acts (issued via
// MemberEpoch or ChannelEpoch) cite attestations via CitedAttestations, making the
// basis of every governance decision publicly auditable.
message Attestation {

    // What or whom the attestation is about (member UID, channel UID, etc).
    Tag                 Subject = 1;

    // Kind of observation.
    AttestationType     Type = 2;

    // TxMsg being cited as evidence.  Already present in the journal and
    // independently verifiable by any member — false attestations are self-refuting.
    fixed64             CitedTxID_0 = 4;
    fixed64             CitedTxID_1 = 5;

    // Which op within the cited TxMsg (0 if the attestation is about the TxMsg as a whole).
    uint32              CitedOpIndex = 6;

    // Observer identity — who filed.  Not trust-authoritative: the observer's word
    // carries no inherent weight beyond their ability to cite verifiable evidence.
    Tag                 ObserverID = 8;

    // When observed (unix seconds).  Used for windowed aggregation
    // (e.g. "strikes in the last 30 days").
    int64               ObservedAt = 10;

    // Optional free-text rationale.  Not cryptographic; for human review.
    string              Rationale = 15;

    // Modality of the claim, addressed by Tag.  The Tag's UID resolves to a
    // LawAttestationModality_* definition in amp.consts.sdl (or any
    // community/app's consts).  Zero UID = unspecified.  Modality is
    // categorical (what kind of utterance), not gradational (how confident).
    // See AOM SD-modal-attestation.md for the canonical modalities.
    Tag                 Modality = 16;
}


// Equivalence is a self-attested claim that two addresses refer to the same
// underlying thing in a stated context.  Non-collapsing: addresses remain
// distinct; readers compose equivalence chains and decide what to honor.
//
// Use cases: translations of the same text, cultural-frame mappings of the
// same role/rite, substrate migration (biological → upload), bridging amp
// MemberIDs to external identity spaces (e.g. Stripe customer IDs).  See
// AOM SD-address-equivalence.md.
message Equivalence {

    // The two addresses being equated.  Order is insignificant — the relation
    // is symmetric (A ≈ B iff B ≈ A); canonical encoding sorts before hashing.
    Tag                 LeftAddress = 1;
    Tag                 RightAddress = 2;

    // Context of equivalence.  Free-form Tag identifying the frame.  Examples:
    // a translation tag, a cultural-frame tag, a substrate-mapping tag, a
    // software-migration tag.  Zero UID = "in general" (strongest claim).
    Tag                 Context = 5;

    // Strength of the equivalence claim, addressed by Tag.  Resolves to a
    // LawEquivalenceStrength_* definition (Identity / Translation /
    // Approximate / Analogous).  Zero UID = unspecified.
    Tag                 Strength = 8;

    // Free-text rationale for human / future-being readers.
    string              Rationale = 15;
}


// WithdrawReason categorizes a withdrawal per AOM SD-withdrawal-consent.md.  Used by both
// amp.Withdraw (substrate-side TxMsg payload) and webapi.WithdrawNote
// (REST/WebSocket wire shape).
//
// Go const names are emitted by protoc-gen-go as `WithdrawReason_<Value>`
// (e.g. WithdrawReason_Consent).
enum WithdrawReason {
    UnspecifiedReason = 0;  // proto default; not a valid withdrawal
    Consent           = 1;
    Inaccuracy        = 2;
    Outdated          = 3;
    Coerced           = 4;
    Forgotten         = 5;
    Departed          = 6;
    InviteRecall      = 7;
    Retracted         = 8;
}


// Withdraw is a self-signed claim that the signer no longer consents to the
// cited records being treated as authoritative representations of them.
//
// NON-ENFORCING: chronicles are immutable; the original records remain
// signed and present.  Withdraw is a parallel signed signal that readers
// MUST surface alongside the original record.  Whether to honor the
// withdrawal — by suppression, redaction, or recontextualization — is a
// per-app, per-community, per-jurisdiction choice the protocol does not
// adjudicate.  See AOM SD-withdrawal-consent.md.
//
// Authority: Subject MUST equal the signer of the containing TxMsg, OR be
// a member who has explicitly delegated withdrawal authority to the signer
// (Memorial speaking for deceased predecessor, etc.) — proven via the
// Delegation citation.
message Withdraw {

    // Subject — the entity whose consent is being withdrawn.
    Tag                 Subject = 1;

    // Addresses of the records consent is being withdrawn from.  Cross-planet
    // addresses supported.  AttrID and EditID typically zero (citing an item
    // rather than a specific edit).
    repeated Address    Withdrawn = 4;

    // Reason for withdrawal, per AOM SD-withdrawal-consent.md.  Same enum used substrate +
    // wire; webapi.WithdrawNote.Reason is the same type.
    WithdrawReason      Reason = 6;

    // Optional delegation address — proves the signer's authority to withdraw
    // on behalf of Subject when Subject != signer.  Zero (no Address set)
    // when Subject == signer.
    Address             Delegation = 8;

    // Free-text rationale.
    string              Rationale = 15;
}


// PlanetInvite is the out-of-band payload delivered to a new member (USB, QR, NFC, email).
// It is passphrase-encrypted via safe.Enclave export before leaving the admin's device.
// File extension: .planet-invite
message PlanetInvite {

    // Planet being invited to.
    Tag                 PlanetTag = 1;

    // Current epoch at the time of invite (for initial sync).
    Tag                 EpochTag = 2;

    // Newly generated member identity assigned by the admin.
    Tag                 MemberTag = 3;

    // Temporary keypair for the invited member.  Prv is cleartext within the invite;
    // the invite itself is passphrase-sealed before leaving the admin's device.
    // The acceptor imports this keypair and rotates it immediately after join.
    safe.KeyPairRecord  TempKey = 5;

    // Known vault endpoints for initial peer discovery — unified with the typed
    // VaultAddr used by NameServiceRecord / FederationPeer.  For Transport="tcp",
    // Address is UTF-8 "host:port".
    repeated VaultAddr  VaultAddrs = 15;

    // Planet epoch key sealed to TempKey via safe.SealFor (anonymous-sender, so
    // the issuing admin is not revealed).  InviteAccept decrypts it immediately
    // so the member can participate in the epoch.
    safe.EncryptedSymKey EpochKey = 20;

    // Bootstrap expiry, unix seconds.  The acceptor rejects on accept when
    // time.Now().Unix() > ExpiresAt.  Stamped at issue using the planet's
    // VaultConfig.BootstrapTTLSecs (or DefaultBootstrapTTL).  Zero means no
    // expiry (only accepted from issuers that intentionally opt out).
    int64               ExpiresAt = 25;

    // Max times this invite may be redeemed.  0 = unset → single-use: the invite
    // carries the one pre-minted MemberTag (field 3).  For a multi-use invite
    // MemberTag is empty and each redeemer self-mints its own identity, so the
    // issuer never holds the joiner's key.
    uint32              MaxRedemptions = 26;

    // Access level a redeemer is granted on join.  NotAllowed (0) = unset → the
    // planet's default member access; snapshotted into each PlanetInviteRedemption.
    Access              GrantedAccess = 27;

    // Proof-signing keypair.  Prv is cleartext within the passphrase-sealed
    // invite (like TempKey); a redeemer signs its redemption's RedeemProof with
    // it, making passphrase + token possession publicly verifiable against the
    // invite policy's anchored public half.  Empty ⇒ the accept leaves no
    // redemption record.
    safe.KeyPairRecord  RedeemKey = 28;

    // The planet's hash policy (EpochTerms.EffectiveHashKit) — the digest kit a
    // RedeemProof signs under, carried so a peerless acceptor needs no synced
    // genesis to produce a verifiable proof.  Zero = the default kit.
    safe.HashKitID      HashKitID = 29;
}


// PlanetInviteOp is the client request to create or accept a member invite.
// Sent as a TxOp body in the request to amp://~/home/invite/new (create) or invite/accept.
message PlanetInviteOp {

    // Planet to create or accept an invite for.
    Tag                 PlanetTag = 1;

    // Passphrase used to encrypt the PlanetInvite for out-of-band delivery (create),
    // or to decrypt an incoming encrypted invite blob (accept).
    string              Passphrase = 5;

    // The invite artifact being redeemed/accepted, as the string the caller
    // holds: the full invite URL or its amp-base32 body (either carrier decodes
    // to the sealed token — one codec, invite.DecodeCarrier).  Empty on issue;
    // the issue response returns the sealed token bytes here.
    bytes               SealedInvite = 10;

    // Redemption ceiling for the invite being issued.  0 = unset → single-use
    // pre-minted slot; > 0 → multi-use self-mint policy.
    uint32              MaxRedemptions = 15;

    // Access granted to each redeemer (issue).  NotAllowed (0) = unset → the
    // planet's default member access.
    Access              GrantedAccess = 16;

    // Expiry override, unix seconds (issue).  0 = unset → the planet's
    // bootstrap TTL.
    int64               ExpiresAt = 17;

    // Invite ID — the sealed-body hash — addressing an existing policy
    // (revoke / list).
    fixed64             InviteID_0 = 20;
    fixed64             InviteID_1 = 21;

    // The member a redemption minted (redeem response) — the self-minted
    // identity now seated on the planet.
    fixed64             MemberID_0 = 22;
    fixed64             MemberID_1 = 23;
}


// SyncMsg is the envelope for all delta sync control messages between vault peers.
// Exactly one of the body fields is set per message — peers detect by nil pointer.
message SyncMsg {
    SyncWatchList    WatchList    = 1;
    SyncRangeOffer   RangeOffer   = 2;
    SyncRangeRequest RangeRequest = 3;
}

// SyncWatchList announces which planets a peer has data for, with high-water marks.
// Sent on peer connect and whenever the watch list changes.
message SyncWatchList {
    repeated SyncPlanetStatus Planets = 1;
}

// SyncPlanetStatus carries a planet UID and the peer's current high-water mark.
message SyncPlanetStatus {
    fixed64             PlanetID_0  = 1;
    fixed64             PlanetID_1  = 2;
    fixed64             HighWater_0 = 3;  // most recent TxTimeID
    fixed64             HighWater_1 = 4;
}

// SyncRangeOffer carries a hash over a TxTimeID range for a planet.
// Used in the Merkle bisection protocol to identify divergence between peers.
message SyncRangeOffer {
    fixed64             PlanetID_0  = 1;
    fixed64             PlanetID_1  = 2;
    fixed64             Start_0     = 3;  // range start (inclusive)
    fixed64             Start_1     = 4;
    fixed64             End_0       = 5;  // range end (inclusive)
    fixed64             End_1       = 6;
    // 128-bit fingerprint: leading 16 bytes of the digest over [Start, End].
    fixed64             RangeHash_0 = 10;
    fixed64             RangeHash_1 = 11;
}

// SyncRangeRequest asks a peer to stream all TxMsgs in a range for a planet.
// Sent when a range hash mismatch is detected after bisection converges.
message SyncRangeRequest {
    fixed64             PlanetID_0 = 1;
    fixed64             PlanetID_1 = 2;
    fixed64             After_0 = 3;      // stream TxMsgs with TxTimeID > After
    fixed64             After_1 = 4;
}


// ══════════════════════════════════════════════════════════════════════
// Chronicle & Codex — AOM DD-chronicle-and-codex.md
// ══════════════════════════════════════════════════════════════════════

// Artifact is one addressable unit in a planet: a (NodeID, AttrID, ItemID)
// triple plus its resolved value.  Appears in Codex entries.
message Artifact {

    // Address within the planet's CRDT space.
    fixed64             NodeID_0 = 1;
    fixed64             NodeID_1 = 2;
    fixed64             AttrID_0 = 3;
    fixed64             AttrID_1 = 4;
    fixed64             ItemID_0 = 5;
    fixed64             ItemID_1 = 6;

    // Logical EditID (latest write's TxID) — informational only.
    // On import, this is replaced by the importing TxMsg's TxID.
    fixed64             EditID_0 = 7;
    fixed64             EditID_1 = 8;

    // The value.  Exactly one of these is set.  Threshold between inline and
    // blob is a writer policy (default 64 KiB); importers accept either form.
    bytes               InlineValue = 10;
    BlobRef             BlobValue = 11;
}

// PlanetOrigin is a forward-only provenance pointer recording that this planet
// was forked from another.  Carries no authority over this planet; the origin
// is informational.  Stored as a planet-public attribute
// (HeadNodeID / std.Attr.PlanetOrigin / fromPlanetID) on the fork's genesis epoch.
message PlanetOrigin {

    // The planet this fork came from.
    Tag                 FromPlanet = 1;

    // The epoch active on FromPlanet at fork time.
    Tag                 FromEpoch = 2;

    // FromPlanet's chronicle head (TxID) at fork time — the most recent TxMsg
    // included in the source Codex.  Informational; useful for forensics.
    fixed64             FromChronicleHead_0 = 3;
    fixed64             FromChronicleHead_1 = 4;

    // Wall-clock fork time (UTC seconds).  Not trusted; informational.
    int64               ForkTime = 5;

    // Optional human-readable reason.  Not interpreted by the protocol.
    string              Label = 6;

    // Version for future extensions.
    int32               Version = 100;
}

// UIDRange is an inclusive range of tag.UIDs — [Start, End] — used to bound
// chronicle slices, Merkle sync ranges, journal scans, and similar spans.
message UIDRange {
    fixed64             Start_0 = 1;
    fixed64             Start_1 = 2;
    fixed64             End_0   = 3;
    fixed64             End_1   = 4;
}

// BlobEntry describes one blob in a sibling content-addressed store.
// Shared between Chronicle and Codex manifests — same shape, same semantics.
message BlobEntry {

    // Blob identity (leading 16 bytes of plaintext hash).
    fixed64             BlobID_0 = 1;
    fixed64             BlobID_1 = 2;

    // Plaintext byte length.
    int64               Size = 3;

    // MIME type (e.g. "image/jpeg"), if known.
    string              ContentType = 4;

    // Path relative to the export root (e.g. "blobs/ab/cd/<blobtag>.bin").
    // Implementations MAY flatten the tree; content addressing is by BlobID.
    string              RelativePath = 5;
}

// ──────────────────────────────────────────────────────────────────────
// Codex — resolved-state snapshot.  Authority resets on import.
// ──────────────────────────────────────────────────────────────────────

// CodexManifest carries schema introspection for a Codex.  Entry counts are
// authoritative in the export trailer, not in this up-front header.
message CodexManifest {

    // Attribute kinds present in the Codex (for fast schema introspection).
    repeated Tag        AttributeKinds = 1;
}

// CodexHeader is the first protobuf record in codex.bin after the preamble.
// A Codex carries resolved state only — no TxMsgs, no source authority.
message CodexHeader {

    // The planet this Codex was exported from.  May be a synthetic tag for
    // external-source imports (e.g. "amp-gen2/prod.plan.tools").
    Tag                 SourcePlanet = 1;

    // The epoch active on SourcePlanet at export time.  Informational.
    Tag                 SourceEpoch = 2;

    // Wall-clock time of export (UTC seconds since epoch).
    int64               CodexTime = 3;

    // Provenance pointer to materialize as PlanetOrigin on the importing planet's
    // genesis.  Nil for external-source imports with no amp origin.
    PlanetOrigin        Origin = 4;

    // Summary for pre-flight validation.
    CodexManifest       Manifest = 5;

    // Optional exporter-provided label.
    string              Label = 6;

    // HashKit that computed the container integrity digest (the trailing digest
    // over preamble + header + entries).  0 = Blake2s_256 (the back-compat default).
    safe.HashKitID      DigestHashKit = 7;

    // Content-model epoch: the SDK proto semantics governing artifact payloads (the
    // Tag/Tags content model).  An importer whose host epoch differs MUST refuse,
    // not silently mis-decode persisted bytes (DD-chronicle-and-codex.md §5.5).
    // Orthogonal to FormatVersion (on-disk layout) — this is payload meaning.  Bump
    // on each wire-incompatible content-model change; amp.ContentModelEpoch is current.
    uint32              ContentModelEpoch = 8;
}

// ──────────────────────────────────────────────────────────────────────
// Chronicle — portable signed-TxMsg slice.  Authority preserved.
// Used for backup, offline SSD transport, restore, and rebase output.
// ──────────────────────────────────────────────────────────────────────

// ChronicleCompactPoint records one rebase event in the lineage chain.
message ChronicleCompactPoint {

    // Chronicle up to this TxID was rebased; older TxMsgs are discardable.
    fixed64             UpToTxID_0 = 1;
    fixed64             UpToTxID_1 = 2;

    // Wall-clock rebase time (UTC seconds).
    int64               CompactTime = 3;

    // Digest of the compacted slice — detects rebase-result divergence.
    bytes               CompactedDigest = 4;

    // TxID of the ChronicleCompact governance TxMsg itself.
    fixed64             CompactTxID_0 = 5;
    fixed64             CompactTxID_1 = 6;
}

// ChronicleCompactHistory is the ordered lineage of rebase points for a planet.
// Oldest first.  Empty if the chronicle has never been rebased.
message ChronicleCompactHistory {
    repeated ChronicleCompactPoint Points = 1;
}

// ChronicleCompact is the governance TxMsg that declares a chronicle compact.
// Signed by the governance quorum.  Peers with the full chronicle may keep it
// for forensics; peers syncing fresh after rebase receive only the compacted
// form plus post-rebase TxMsgs.  See AOM DD-chronicle-and-codex.md §4.7.
message ChronicleCompact {

    // TxID up to which the chronicle has been rebased; older TxMsgs discardable.
    fixed64             UpToTxID_0 = 1;
    fixed64             UpToTxID_1 = 2;

    // Digest of the compacted chronicle at the time of rebase.
    bytes               CompactedDigest = 3;

    // Wall-clock rebase time (UTC seconds).
    int64               CompactTime = 4;

    // Optional rationale for audit trails.
    string              Label = 5;

    // Reserved for future redaction manifest (AOM DD-chronicle-and-codex.md §4.7.4).
    reserved 10 to 19;
}

// ChronicleManifest carries Chronicle schema introspection (none defined yet).
// Entry counts are authoritative in the export trailer, not in this header.
message ChronicleManifest {
}

// ChronicleHeader is the first protobuf record in chronicle.bin after
// the preamble.  The portable realization of a planet's Chronicle.  The
// embedded GenesisEpoch TxMsg lets any receiver with the founders' pubkeys
// verify every TxMsg in this chronicle offline — no network required.
message ChronicleHeader {

    // The planet this chronicle was exported from.
    Tag                     SourcePlanet = 1;

    // Governance snapshot: the epoch active on SourcePlanet at export time.
    Tag                     SourceEpoch = 2;

    // The genesis PlanetEpoch TxMsg, embedded verbatim (raw signed bytes) so
    // any receiver with the founders' pubkeys can verify every TxMsg in this
    // chronicle offline.
    bytes                   GenesisEpoch = 3;

    // TxID range included, inclusive on both ends.  Whole-planet export:
    // Range.Start is the genesis TxID, Range.End is the chronicle head at
    // export time.  Slice: Range bounds the slice.
    UIDRange                Range = 4;

    // Wall-clock time of export (UTC seconds since epoch).
    int64                   ExportTime = 5;

    // Compact lineage.  Nil if this chronicle has never been compacted.
    ChronicleCompactHistory CompactHistory = 6;

    // HashKit that computed the container integrity digest.  0 = Blake2s_256
    // (the back-compat default).
    safe.HashKitID          DigestHashKit = 7;

    // Reserved for future redaction manifest (AOM DD-chronicle-and-codex.md §4.7.4).
    reserved 10 to 19;

    // Summary for pre-flight validation.
    ChronicleManifest       Manifest = 20;

    // Optional exporter-provided label ("nightly-backup 2026-04-23").
    string                  Label = 21;
}


// ══════════════════════════════════════════════════════════════════════
// Brand & Planet metadata — AOM DD-name-service.md §2
// ══════════════════════════════════════════════════════════════════════

// PlatformID identifies a build/install target.  Values mirror Unity's
// RuntimePlatform enum directly so amp ↔ Unity conversion is a cast.  Values
// >= 100 are amp-specific variants Unity doesn't enumerate (e.g. de-Googled
// Android forks — same APK as stock Android, different install channel).
enum PlatformID {
    Universal           = 0;    // proto3 default
    macOS               = 1;    // Unity RuntimePlatform.OSXPlayer
    Windows             = 2;    // Unity RuntimePlatform.WindowsPlayer
    iOS                 = 8;    // Unity RuntimePlatform.IPhonePlayer
    Android             = 11;   // Unity RuntimePlatform.Android (stock)
    Linux               = 13;   // Unity RuntimePlatform.LinuxPlayer
}

// AppTarget describes where to obtain the app for one PlatformID.
message AppTarget {
    PlatformID          Platform     = 1;
    string              DownloadURL  = 3;    // store URL, HTTPS download, magnet link, etc.
    string              BundleID     = 4;    // "org.plan.tunr" (iOS/Android bundle ID)
    string              MinOSVersion = 5;    // minimum OS version, e.g. "14.0"
    string              AppleTeamID  = 6;    // Apple Developer Team ID; AASA appID is "{AppleTeamID}.{BundleID}"
}

// AppLink is one curated entry point — typically an amp:// or https:// URL with a label.
message AppLink {
    string              Label = 1;
    string              URL   = 2;
}

// CrateRef is a lightweight reference to a crate by URI, with optional content-addressing.
// Used wherever a brand or manifest needs to cite a crate without embedding its full
// CrateInfo (e.g. Brand.BundledCrates).  BlobID is the leading 16 bytes of the built
// crate's plaintext hash, matching the AssetEntry/BundleManifest convention; zero =
// unknown / not pinned.
message CrateRef {
    string              CrateURI = 1;    // "asset:{PublisherID}/{CrateID}"
    fixed64             BlobID_0 = 2;
    fixed64             BlobID_1 = 3;
}

// Brand is a planet's identity record: name, domain, schemes, install targets,
// curated entry points, the per-planet bundled crate set, and the publishing
// federation.  Lives at a single CRDT address per planet
//   (PlanetID, HeadNodeID, amp.brand, amp.brand.UID, EditID=*)
// All fields admin-signable; founders may include a Brand TxOp in the genesis
// envelope as the first record (EditID=0) or defer to a later admin-signed
// channel write.  AOM DD-name-service.md §2.
message Brand {
    string              AppName          = 1;     // "Tunr"
    string              AppDomain        = 2;     // "spaces.soundspectrum.com"
    string              AppDesc          = 3;
    string              OrgName          = 5;     // "SoundSpectrum"
    string              OrgHomeURL       = 6;
    string              AppHomeURL       = 7;
    repeated string     URLSchemes       = 10;    // ["soundspectrum", "tunr"]
    repeated AppTarget  Targets          = 15;
    string              CrateSnapshotURL = 20;
    repeated AppLink    Links            = 25;
    repeated CrateRef   BundledCrates    = 26;

    // NamedBy is the federation that names this planet — the §3.3 back-edge the
    // planet acknowledges as its current namer.  Single-valued: a planet is named
    // through one federation at a time but may roam.  Read by NameService
    // consumers to enforce the canonic-binding invariant of AOM DD-name-service.md §3.3.
    Tag                 NamedBy          = 30;

    // TemplateSet selects which portal template set renders this planet's HTTP
    // surfaces — names a template-set channel (NodeID) on the naming federation
    // planet that app.www reads template Segments from.  Empty = the federation's
    // default set.  Members select among federation-published sets; the markup is
    // federation-authored (DD-name-service.md §12.3).
    Tag                 TemplateSet      = 31;
}


// ══════════════════════════════════════════════════════════════════════
// NameService & federation — AOM DD-name-service.md
// ══════════════════════════════════════════════════════════════════════

// Address is the wire form of tag.Address — a (PlanetID, NodeID, AttrID, ItemID, EditID)
// tuple addressing a single CRDT cell across any planet.  PlanetID = 0 means
// "this planet" (the planet of the containing TxMsg), matching Citation's convention.
// Used to cite a specific TxOp address across planets without dereferencing.
message Address {
    fixed64             PlanetID_0 = 1;
    fixed64             PlanetID_1 = 2;

    fixed64             NodeID_0 = 3;
    fixed64             NodeID_1 = 4;

    fixed64             AttrID_0 = 5;
    fixed64             AttrID_1 = 6;

    fixed64             ItemID_0 = 7;
    fixed64             ItemID_1 = 8;

    fixed64             EditID_0 = 9;
    fixed64             EditID_1 = 10;
}


// VaultAddr is a transport-tagged vault endpoint.  Used by NameService records
// and federation pointers to hint where a planet can be pinned.  Reuses the
// envelope shape of AOM SD-security-sync.md §7.2 VaultAddresses; transports
// advertise themselves via the Transport string so future kits land without
// proto changes.
message VaultAddr {
    string              Transport = 1;    // "tcp", "udp", "reticulum", etc.
    bytes               Address   = 2;    // transport-specific encoding
}


// TrustState is the three-state verdict for a NameService record's §3.3 back-edge
// consent check. Unchecked (the resolver lacked the target's
// live Brand to verify) must never map to Verified.  AOM DD-name-service.md §3.3/§15.1.
enum TrustState {
    Unchecked = 0;  // not yet verifiable — cold resolve, no live Brand held (proto3 default)
    Verified  = 1;  // back-edge holds: target Brand.NamedBy == the answering federation
    Refuted   = 2;  // back-edge fails: target back-points elsewhere (a squatter)
}


// NameServiceRecord — one FQDN → PlanetID record published by a federation.
// Lives in a NameService channel at
//   (NodeID = channel_node, AttrID = amp.name.service.record, ItemID = hash(fqdn)).
// Signed under the publishing federation's epoch admin.  AOM DD-name-service.md §3.1.
message NameServiceRecord {

    string              FQDN          = 1;    // "spaces.plan.tools" — exact-match key for Resolve
    Tag                 PlanetID      = 2;    // target planet UID

    // First Brand TxOp address: (target PlanetID, HeadNodeID, amp.brand, amp.brand.UID, EditID=0).
    // Consumers may dereference this to read the founders-signed first Brand
    // record when one was published in the genesis envelope; absent that, the
    // first admin-signed Brand edit fills this slot.
    Address             BrandAddr     = 3;

    // Full Brand snapshot for offline Search ranking — copy of the latest
    // Brand at the time the record was registered.  A federation refreshes
    // this when the target planet's Brand operationally updates.
    Brand               BrandSnapshot = 4;

    // Where the target planet can be pinned for bootstrap.
    repeated VaultAddr  VaultAddrs    = 7;

    Tag                 RegisteredAt  = 8;    // TxID of registering TxMsg (initial Upsert)
    Tag                 RegisteredBy  = 9;    // signing member's MemberID (federation admin)

    // ── Reserved at v250 — mechanism deferred, slot locked (AOM DD-name-service.md §10.4). ──
    // These ship INERT (unverified, ignored by consumers) but freeze the field
    // number↔meaning binding now, so the §15 trust primitives — and the §16 civil-
    // jurisdiction / brand-dispute adjudication that rides them — land post-freeze with
    // no wire break.  Documented here as if live so the contract is fully legible to
    // auditors; promote a `reserved` line to a real field when its mechanism ships.

    // AuthorityKit — naming-authority attestation: proof the registrant is entitled to
    // this FQDN (domain-control challenge, DID-bound claim, or witness co-sign).  An
    // open-namespace kit id (the CryptoKit pattern: a tag.UID kit) so the proof
    // *mechanism* is chosen after the freeze; empty = unattested; consumers treat an
    // unrecognized kit as unverified.  The only post-freeze defense against cross-
    // federation FQDN squatting / confusables (§14.3, §15.3).  Also the §16 civil-
    // jurisdiction carrier: a city / government / charter authority attesting "this FQDN
    // belongs to this entity under our jurisdiction" is just another naming-authority
    // kit — multiple jurisdictions may attest one name and federations choose which to
    // honor (Ostrom polycentricity; the wire stays neutral on legitimacy).
    reserved 10; // AuthorityKit   (Tag)

    // AuthorityProof — opaque proof paired with AuthorityKit, verified by the named
    // kit.  Format is kit-defined (e.g. a signed domain-control challenge or a notarized
    // jurisdiction record).  Empty when AuthorityKit is empty.
    reserved 11; // AuthorityProof (bytes)

    // Reputation — federation-curated reputation / threat verdict for this record
    // (§15.7 federation threat-mesh).  Opaque, federation-signed; ships empty until the
    // additive advisory channel lands, so a federation's verdict can ride the record it
    // judges.  Also the §16 brand-dispute carrier — "contested" / "adjudicated to X by
    // authority Y", a federation- or jurisdiction-signed ruling (Ostrom conflict-
    // resolution; the protocol attaches the dispute, it never adjudicates).
    reserved 12; // Reputation     (bytes)
}


// FederationPeer — peer of a FederationDirectory.
// AOM DD-name-service.md §4.4.
message FederationPeer {
    Tag                 FederationID = 1;    // the peer federation's planet UID
    repeated VaultAddr  VaultAddrs   = 2;    // where peer federation is pinnable
    string              Label        = 3;    // human-readable, informational

    // ── Reserved at v250 — directory-entry provenance, mechanism deferred (§10.4, §15.4). ──
    // Today forwarding is trust-by-position in a flat list: a member walking a directory
    // cannot tell a vouched-for parent from a random sibling a peer happened to list.
    // These slots let relation-aware routing land post-freeze with no wire break; inert
    // until then.  Documented as if live for auditor legibility.

    // Relation — how this peer relates to the directory's publishing federation.  An
    // explicit enum (not a bitfield), per the named-enum convention.  Planned values:
    //   PeerRelation_Unspecified = 0   // flat list, trust-by-position — today's behavior, the forward-safe default
    //   PeerRelation_Parent      = 1   // the publisher is a sub-federation of this peer
    //   PeerRelation_Sibling     = 2   // peer federations at the same tier
    //   PeerRelation_Backup      = 3   // mirror / failover directory source
    reserved 4; // Relation    (PeerRelation enum)

    // Attestation — optional federation-signed vouch for this peer (§15.4): a signed
    // statement that the publisher has verified the peer's identity / standing, so
    // directory walkers can weight forwarding by provenance.  Empty = unvouched.
    reserved 5; // Attestation (bytes)
}


// FederationDirectory — federation peer pointers, NS-record style cross-federation
// forwarding (AOM DD-name-service.md §4.4).  Lives at
//   (HeadNodeID, amp.federation.directory, amp.federation.directory.UID)
// on a federation planet.  Single CRDT item per federation; admin-signed like
// any governance change.  Analogous to DNS NS records — bounded, opt-in.
message FederationDirectory {
    repeated FederationPeer Peers     = 1;
}


// InviteStatus is an invite policy's lifecycle state.  Revoked is terminal —
// the ACC invite rule rejects an un-revoke; reissue instead, so the redemption
// ledger's legal reading stays monotonic.
enum InviteStatus {
    InviteActive  = 0;
    InviteRevoked = 1;
}


// PlanetInvitePolicy is the governed, planet-side twin of a sealed PlanetInvite
// token: the founder/admin-authored rules an invite is redeemed under.  Lives
// planet-public at (PlanetInvites channel, PlanetInvitePolicy, inviteID) where
// inviteID is the hash of the sealed token body — computable identically by
// issuer, redeemer, and the ACC gate.
message PlanetInvitePolicy {

    // The invite this policy governs, keyed by the hash of its sealed body.
    fixed64             InviteID_0 = 8;
    fixed64             InviteID_1 = 9;

    // Max redemptions.  0 = unset → single-use pre-minted slot (Member below
    // pins the slot); > 0 → multi-use self-mint.
    uint32              MaxRedemptions = 2;

    // Expiry, unix seconds.  The policy is authoritative over the token's own
    // ExpiresAt at redemption; 0 = no expiry (intentional issuer opt-out).
    int64               ExpiresAt = 3;

    // Access granted to each redeemer.  NotAllowed (0) = unset → the planet's
    // default member access.  A redemption claiming more than this is rejected.
    Access              GrantedAccess = 4;

    // Lifecycle state; see InviteStatus.
    InviteStatus        Status = 5;

    // Public half of the token's RedeemKey — the anchor every RedeemProof is
    // verified against.  Chain of authority: genesis → founder-gated policy →
    // proof → redemption → member.
    safe.KeyRef         RedeemKey = 6;

    // Single-use only: the pre-minted member this invite admits.  Zero for
    // multi-use (each redeemer self-mints).
    fixed64             MemberID_0 = 10;
    fixed64             MemberID_1 = 11;
}


// PlanetInviteRedemption is the durable, signed record of one invite redemption —
// the audit / legal trail of who joined via which invite and when.  The redeem
// and accept engines write one per redemption in the same tx as the joining
// MemberEpoch; the ACC invite rule gates its admission on every vault, and
// in-rank records project root-channel member grants (SD-invite-governance §6).
message PlanetInviteRedemption {

    // The redeemed invite, keyed by the hash of its sealed body (stable across
    // copies).
    fixed64             InviteID_0 = 7;
    fixed64             InviteID_1 = 8;

    // Member identity that joined via this redemption — self-minted by the redeemer
    // for a multi-use invite, or the invite's pre-assigned member for single-use.
    fixed64             MemberID_0 = 9;
    fixed64             MemberID_1 = 10;

    // Redemption NowID — a time-ordered UID that both uniquely stamps this
    // redemption and encodes when it happened.
    fixed64             RedeemedAt_0 = 3;   // bytes 0..7
    fixed64             RedeemedAt_1 = 4;   // bytes 8..15

    // Access granted at redemption — a snapshot of the invite's GrantedAccess so the
    // record stands alone as the authoritative grant proof.
    Access              GrantedAccess = 5;

    // The member signing key the RedeemProof binds — carried so the record
    // verifies standalone after the member later rotates keys.  Must equal the
    // same-tx MemberEpoch.SigningKey at admission.
    safe.KeyRef         MemberSigningKey = 11;

    // Domain-separated RedeemKey signature (safe.SigningDomain amp.sig.invite.v1)
    // over (planet, invite, member, RedeemedAt, member signing key) — proves the
    // redeemer opened the sealed token, verifiable by any third party against the
    // policy's anchored RedeemKey.  A record without a valid proof is void.
    bytes               RedeemProof = 6;
}
