syntax = "proto3";

// package amp is an implementation-independent API for a pluggable client-server UI/UX system,
// featuring support and integration for files, media, and communication.
//
// Welcome to art.media.platform (c) 2024 ("amp"): a runtime model and specification to securely share and experience digital media under their own agreed terms and permissions,
//   something we can all agree on.
package amp;

import "stdlib/safe/safe.proto";

// Tells protoc that a .proto file importing amp.proto what package import to use within Go.
option go_package = "github.com/art-media-platform/amp.SDK/amp";

option csharp_namespace = "art.media.platform";

// TxOpFlags are 8 available bit flags that describe a TxOp.
enum TxOpFlags {
    Unassigned = 0;    // invalid state
    MetaOp     = 0x01; // op is out of band and/or should not persist
    Upsert     = 0x04; // write value at [Address]
    Delete     = 0x08; // drop value at [Address]
}

// TxField maps a fixed count of int64 payload fields.
//
// Why not a proto message? Compression is much better since values usually repeat.
enum TxField {
    Nil = 0;

    NodeID_0 = 1;
    NodeID_1 = 2;

    AttrID_0 = 4;
    AttrID_1 = 5;

    ItemID_0 = 6;
    ItemID_1 = 7;

    EditID_0 = 10;
    EditID_1 = 11;

    MaxFields = 16;
}

// The first byte of a serialized proto.Message for future-proofing:
//
//    0x0F   which inline 16 byte (4 UID literals) that immediately follow
//    0xF0   flags that do not affect value header size.
//
enum ValueHeaderFlags {
    None = 0;

    FromID   = 0x01; // author or other originator
    TxID     = 0x02; // tx that publishes this entry
    UID_C    = 0x04; // reserved
    UID_D    = 0x08; // reserved

    // FromSelf = 0x10; // equivalent to FromID of owner (saves 16 bytes)
}

enum TxStatus {
    Ready        = 0; // not set / invalid
    Received     = 1; // tx received, pending processing
    Validated    = 2; // tx verified, pending commit
    Committed    = 3; // tx committed to local storage
    Propagated   = 4; // tx propagated to peers
    Acknowledged = 5; // tx acknowledged by peers
    Rejected     = 6; // tx rejected (invalid, malformed, etc)
}

// TxEnvelope contains tx fields that are used for routing and decryption of tx content.
//
// TxEnvelope is IN THE CLEAR, all other tx components are encrypted based on the TxEnvelope fields.
//
// TxHeader, TxOps, and the tx datastore are therefore said to be securely "within" a tx.
//
// INVARIANT: One TxMsg = one encryption context.  A single Epoch field determines the
// encryption key for the entire payload.  All ops in a TxMsg must be readable by anyone
// holding that epoch key.  To write ops under different encryption domains (e.g. two
// private channels with different keys), author separate TxMsgs — one per epoch.
//
// Epoch modes:
//   - nil/zero  → planet-public: payload is plaintext, only signed (governance, MemberEpoch, PlanetEpoch).
//   - planet ID → private planet: all ops encrypted under the planet epoch key.
//   - channel ID → private channel: all ops encrypted under that channel's epoch key.
//
// FromID (author identity) resides inside the encrypted TxHeader so that passive observers
// and relay vaults cannot correlate sender identity with traffic patterns.
message TxEnvelope {

    // Universally unique ID assigned when a tx is created
    fixed64             TxID_0 = 1;
    fixed64             TxID_1 = 2;

    // Which planet this tx should be applied to.
    Tag                 Planet = 6;

    // Which epoch (planet or channel) this tx was created within.
    // Determines which epoch keyring to use for encryption/decryption.
    // Works for both planet-level and channel-level encryption.
    // A single TxMsg is encrypted under exactly one epoch — never mixed.
    Tag                 Epoch = 7;

    // Byte offset from the end of the marshalled TxEnvelope to the start of the TxHeader.
    uint64              HeaderOffset = 10;

    // Byte offset from preamble start to the signature.
    // Allows signature verification without parsing the payload.
    uint64              SignatureOffset = 20;

    // Proves sender is a planet/channel member without revealing identity.
    // HMAC(proof_key, TxID) where proof_key = HKDF(epoch_key, "member-proof").
    // Allows relay vaults to reject spam without decrypting content.
    bytes               MemberProof = 25;

    // Planet epoch UID that was active when this TxMsg was sealed.
    // For channel-encrypted TxMsgs, this enables the derived content key:
    //   content_key = HKDF(channel_epoch_key || planet_epoch_key, "content")
    // Rotating the planet epoch automatically invalidates all channel-derived keys,
    // even if the channel epoch hasn't rotated.
    // For planet-encrypted TxMsgs (Epoch = planet epoch), this is zero/omitted.
    fixed64             PlanetEpoch_0 = 30;
    fixed64             PlanetEpoch_1 = 31;

}

// TxHeader contains primary information about a tx and is encrypted based on TxEnvelope fields.
message TxHeader {

    // Refers to a tag ID (usually a TxID) for subsequent requests and responses.
    // Used to reference a tx thread to a request.
    // If nil or equal to TxID, then this tx is context-free and TxID is implied context ID.
    fixed64             ContextID_0 = 1;
    fixed64             ContextID_1 = 2;

    // Author identity — moved from TxEnvelope into encrypted payload
    // so passive observers cannot correlate sender identity with traffic.
    fixed64             FromID_0 = 3;
    fixed64             FromID_1 = 4;

    // Status of the most recent PinRequest revision.
    PinStatus           Status = 7;

    // Number of TxOps in this tx.
    uint64              OpCount = 10;

    // If set, updates the active PinRequest state.
    PinRequest          Request = 12;

    // Referenced by a TxOp; a Citation references necessary context that authorizes the TxOp to be applied.
    repeated Citation   Citations = 14;

}



// Expresses the status of an amp.Pin.
enum PinStatus {
    Inactive = 0;  // no op
    Started  = 2;  // pin now on service
    TxCommit = 6;  // tx commit complete / failed
    Syncing  = 8;  // state sync in progress
    Synced   = 9;  // state is synchronized; drives UI updates requiring a stable state.
    Complete = 16; // pin complete / closed / failed
}


// Login -- STEP 1: client -> host
message Login {

    Tag                Member = 1;
    Tag                Planet = 2;
    Tag                Device = 5;

    // HostAddress is the network address of the server known to the client (e.g. IP address, localhost, domain name, etc)
    // amp.Host uses this as the host name when serving URLs for the client to consume.
    string             HostAddress = 8;

    // Checkpoint allows the client to resume an auth session.
    LoginCheckpoint    Checkpoint = 12;

}

// LoginChallenge -- STEP 2: host -> client
message LoginChallenge {
    bytes               Hash = 1;
}

// LoginResponse -- STEP 3: client -> host
message LoginResponse {
    bytes               HashResponse = 1;
}

// LoginCheckpoint wraps oauth2 -- see oauth2.Token
message LoginCheckpoint {
    string              TokenType    = 1;
    string              AccessToken  = 2;
    string              RefreshToken = 3;
    int64               Expiry       = 4; // unix UTC seconds

    string              UserID = 11;
    string              URI    = 12;
}

// PinRequest is a peer request to "pin" a set of element IDs, where selected attrs and items will be pushed to the peer.
message PinRequest {

    // Used for easy sorting and ordering of requests
    //    0: initial request
    //    1: 1st revision
    //    2: 2nd revision ...
    int64               Revision = 1;

    // Operation mode for this pin request.
    PinMode             Mode = 2;

    // Explicit URL or ID invocation associated with this request.
    string              URL = 4;

    // Selects which values to synchronize and which NOT to synchronize.
    ItemSelector        Selector = 6;

    // If set, requests a preferred tx byte size limit.
    int64               PreferredTxSize = 7;
}


// Expresses an easy to use set of address ranges.
message ItemSelector {
    repeated ItemSpan Spans      = 1;
    bool              Normalized = 2;
}

// Expresses an ItemID range for a given NodeID.
message ItemSpan {

    //SpanMode Op       = 1; // TODO: how are spans updated or removed?

    fixed64  NodeID_0 = 3; // channel node or wildcard
    fixed64  NodeID_1 = 4; // "

    fixed64  AttrID_0 = 6; // attr ID or wildcard
    fixed64  AttrID_1 = 7; // "

    fixed64  ItemID_Min_0 = 10; // min ItemID (inclusive)
    fixed64  ItemID_Min_1 = 11; // "
    fixed64  ItemID_Max_0 = 12; // max ItemID (inclusive)
    fixed64  ItemID_Max_1 = 13; // "

    int64    ItemsPerAttr = 14; // max items returned per unique attr ID (0 denotes no limit)
    int64    EditsPerItem = 15; // max edits returned per unique item ID
}



// Determines how much a Pin emits to its client Requester.
enum PinMode {

    // If set, no state is emitted to the client.
    // Used when only writing via CommitTx()
    Commit = 0;

    // Send requested attrs, then auto-close this request
    // Used when instantaneous state is sufficient (e.g. applying a setting)
    Snapshot = 1;

    // If set, the request will remain open after the initial state snapshot is sent.
    // Requester will receive state updates until this request is closed.
    MaintainSync = 2;
}




enum Enable {
    LatentOff = 0x0;
    LatentOn  = 0x1;
    ActiveOn  = 0x2;
    ActiveOff = 0x3;
}


enum UriScheme {
    Unspecified = 0;

    Http     = 5;  // "http:/..."
    Https    = 6;  // "https:/..."
    Data     = 7;  // "data:{mime-type}[[;base64],{data-encoding}]"
    File     = 9;  // "file:/{hfs-pathname}"

    Asset     = 15; // "asset:({tag.name} | //{domain_name}/{crate.name}/{asset.name})
    AppNative = 16; // "[[{app_scheme}://planet.or.domain_name/]{verb}/]{query}"
}

// Tag is a versatile and lightweight way to fuse any URL, ID, precise geo-location, crypto address, content-type, or payload text.
//
// All fields are optional and their meaning is contextual.
message Tag {

    /// open-use inline fields; typical encoded size is 10-20 bytes, max possible size is 170 bytes
    ///
    fixed64 UID_0 = 3;
    fixed64 UID_1 = 4;

    int64   I     = 16;
    int64   J     = 17;
    int64   K     = 18;
    Units   Units = 21; // units for (i,j,k)

    /// open-use non-inline fields
    ///
    string  ContentType = 24; // IANA RFC 2045 media type; e.g. "text/html", "image/png", "image/*", "amp.vis/content.*"
    string  URI         = 26; // IANA RFC 1738 URL or unix pathname
    string  Text        = 28; // UTF8 plain-text, XML, RTF
}


// Tags is a multi-purpose, serializable, and customizable tree of tags.
//
// All fields are optional and their meaning is contextual.
message Tags {
    Tag           Head     = 1; // identifies this branch
    repeated Tag  SubTags  = 4; // amplifying attributes or values
    repeated Tags Children = 6; // sequential sub trees
}


// Units specifies a standard units convention.
enum Units {
    Unitless    = 0;  // units not specified
    Operations  = 1;  // total operation count
    Bytes       = 2;  // any byte offset
    Pixels      = 3;  // texels or device pixels; not for typographic sizes
    Plank       = 5;  // TOE length
    Nanometers  = 7;  // 10^9 nm == 1 m
    Millimeters = 10; // 10^3 mm == 1 m; 1 point == 1/72 inches == 0.3527777778 mm
    Meters      = 11; // IEEE 3773 length for humans
    LightYears  = 16; // 1 light year == 9460730472580800. meters
}



// A Citation is referenced by a tx operation (TxOp), pointing to values that are expected to validate the operation to be performed.
//
// Allows amp's validation runtime to access necessary public keys for other members to validate txs signed by a given author.
//
//   ChannelID      AttrID                    ItemID                     EditID
//   ---------      ------                    ------                     ------
//   {ACC_ChID}  / "series.Keyring.ACC"    / {KeyringID}.{GroupID} / {ACC_Epoch}    // where an ACC publishes keys for an explicit member or child ACC IDs
//   {GroupID}   / "series.Keyring.public" / {KeyringID}           / {Group_Epoch}  // where member or groups publish their planet public keys; MEMBER WRITE ACCESS ONLY
//
// To "join" a private channel, one requires keyring UID (typically sent with the channel invite OR can only be passed out of band; e.g. a written tag)
//
// When an ACC removes or alters a member's access, it must issue a new keyring epoch. This means for each channel member, the channel's private key
//   is encrypted using each member's latest public key, so that only the member can decrypt them.
message Citation {

    // If set, selects which items this Citation applies to.
    // ItemSpan            Span = 1;

    // The channel epoch that contains the authorizing ACC reference
    fixed64             ChannelEpochID_0 = 2;
    fixed64             ChannelEpochID_1 = 3;

    // Access Control Channel (ACC)
    // fixed64             ACC_0 = 2;
    // fixed64             ACC_1 = 3;

    // ACC epoch that authorizes the requested operation.
    fixed64             ACC_Epoch_0 = 4;
    fixed64             ACC_Epoch_1 = 5;

    // // Which member authored this operation
    // fixed64             AuthorID_0 = 6;
    // fixed64             AuthorID_1 = 7;

    // // Author epoch containing their latest public keys
    // fixed64             AuthorEpochID_0 = 8;
    // fixed64             AuthorEpochID_1 = 9;

    // Keyring ID match
    fixed64             KeyringID_0 = 10;
    fixed64             KeyringID_1 = 11;


}


// Access levels ordered by privilege (higher = more access).
enum Access {
    NotAllowed = 0;
    Invite     = 1;    // Can see the channel exists and invite others
    Private    = 3;    // Can see metadata but not content
    ReadOnly   = 4;    // Can read content
    ReadWrite  = 6;    // Can read and write
    Admin      = 10;   // Full control: create sub-channels, manage access
}

// AccessGrant maps a member (or default, if MemberTag is nil) to an Access level.
message AccessGrant {
    Tag                 MemberTag = 1; // Member identity (nil = default grant)
    Access              Access    = 2;
}

// AccessGrants is a set of per-member access grants.
message AccessGrants {
    repeated AccessGrant Grants = 1;
}

// Governing unit of amp channel permissions and security.
message ChannelEpoch {
    Tag                 Channel = 1; // channel this record applies to
    Tag                 ACC     = 2; // channel with access authority.  if nil, Channel is its own ACC.
    Tag                 ChType  = 6; // channel type name and/or ID

    string              Label     = 10; // debugging
    string              LegacyURI = 11;

    // Per-member permissions for this channel (or ACC).
    AccessGrants        MemberGrants  = 20;

    // Default permissions for members not listed in MemberGrants.
    AccessGrants        DefaultGrants = 21;
}


// BlobRef is a content-addressed reference to an encrypted media blob stored outside a TxMsg.
// Blobs are encrypted with the planet/channel epoch key before storage and transit.
// A blob is identified by (PlanetID, BlobTag.UID) where BlobTag.UID is a unique time-based ID.
// The leading 16 bytes of the hash (Hash_0, Hash_1) also serves as a tag.UID for content-addressing.
message BlobRef {

    // Planet this blob belongs to.
    fixed64             PlanetID_0 = 1;
    fixed64             PlanetID_1 = 2;

    // Plaintext size in bytes (before encryption).
    int64               ByteSize = 5;

    // Hash algorithm used for blob integrity (default: Blake2s_256).
    // Each BlobRef is self-describing — the validator reads this field
    // to select the correct HashKit for verification.
    safe.HashKitID      HashKitID = 8;

    // HashKit digest of encrypted blob content (4 x fixed64 = 32 bytes).
    // Computed over the encrypted bytes using the algorithm specified by HashKitID.
    fixed64             Hash_0 = 10;
    fixed64             Hash_1 = 11;
    fixed64             Hash_2 = 12;
    fixed64             Hash_3 = 13;

    // Blob identity and content type.
    // BlobTag.UID is the blob's unique time-based ID (the blob's identity within the planet).
    // BlobTag.ContentType is the MIME type (e.g. "image/jpeg", "audio/mpeg").
    Tag                 BlobTag = 16;
}


// PlanetStorageOpts configures per-planet storage priority and budgets.
// Stored as a home planet attribute alongside PlanetBinding, keyed by planet UID.
// Drives cache eviction: lower-priority planets have their decrypted cache evicted first.
message PlanetStorageOpts {

    // Storage priority (higher = more important, 0 = default).
    // Drives cache eviction ordering: lowest-priority planets evicted first.
    int32               Priority = 1;

    // Max encrypted blob storage for this planet in bytes (0 = unlimited).
    int64               MaxBlobBytes = 2;

    // Max decrypted cache for this planet in bytes (0 = unlimited).
    int64               MaxCacheBytes = 3;
}


// PlanetEpoch is published in the root ACC channel to establish or rotate a planet epoch key.
message PlanetEpoch {

    // Identity of this epoch.
    Tag                 EpochTag = 1;

    // Previous epoch (forms a chain).  Nil for genesis epoch.
    Tag                 PreviousEpoch = 2;

    // Human-readable label (e.g. "Genesis", "Post-revocation epoch 3").
    string              Label = 5;

    // Crypto suite for this epoch.
    // Determines which CryptoKit is used for signing, symmetric, and asymmetric ops.
    safe.CryptoKitID    CryptoKitID = 10;

    // If true, this planet operates in public mode: no payload encryption, signature-only.
    // Set at genesis and cannot be changed without planet rebase.
    // Anyone can syndicate and view content; only members can author (signature required).
    bool                IsPublic = 15;

    // Planet-wide governance settings (enforced by vaults):
    int64               MaxTxMsgSize = 20;             // Max single TxMsg bytes (default: 1 MB)
    int64               MaxMemberBytesPerWindow = 21;  // Max bytes per member per window (default: 100 MB)
    int64               MaxMemberTxPerWindow = 22;     // Max TxMsg count per member per window (default: 10000)
    int64               RateLimitWindowSecs = 23;      // Sliding window duration in seconds (default: 86400 = 24h)

    // Maximum seconds after an epoch rotation during which old-epoch TxMsgs are still accepted.
    // Allows offline members (mesh-only, off-grid) to author under the old epoch and have their
    // TxMsgs accepted when they reconnect.  After this window, old-epoch TxMsgs are rejected.
    // Enforced at the application layer, not by relay vaults.
    // If 0, DefaultGracePeriod is used (90 days)
    int64               MaxGracePeriod = 25;

    // Default entry channel — where members land when opening the planet.
    // The Foyer is to play as Index is to search.
    Tag                 Foyer = 30;

    // Courtesy listing of public-facing nodes on this planet.
    // Points to a Node whose attrs enumerate discoverable channels and content.
    Tag                 Index = 31;

    // Planet glyph or icon reference (e.g. asset URI, emoji, or content-type tag).
    Tag                 Glyph = 32;

    // Human-readable description of this planet.
    string              About = 33;
}


// MemberEpoch is published in the ACC channel to add, modify, or revoke a member.
message MemberEpoch {

    // Member identity.
    Tag                 MemberTag = 1;

    // Planet (or channel) epoch this entry belongs to.
    // Must match the PlanetEpoch.EpochTag so recipients store the key under the correct ID.
    Tag                 Epoch = 2;

    // Planet epoch key encrypted with this member's asymmetric public key (via EncryptToPeer).
    bytes               EncryptedPlanetKey = 5;

    // 0=active, 1=suspended, 2=revoked
    int32               Status = 8;

    // Member's signing public key — used for signature verification and,
    // via CryptoKit derivation, for asymmetric encryption (EncryptToPeer/DecryptFromPeer).
    bytes               PubKey = 12;

    // Crypto suite for this member's key material.
    // Typically matches the epoch's CryptoKitID but allows per-member override.
    safe.CryptoKitID    CryptoKitID = 15;

    // Signing public key of the admin who encrypted EncryptedPlanetKey.
    // The recipient needs this for DecryptFromPeer (CryptoKit derives asymmetric key internally).
    bytes               EncryptorPubKey = 18;
}


// PlanetInvite is the out-of-band payload delivered to a new member (USB, QR, NFC, email).
// It is passphrase-encrypted via safe.Enclave export before leaving the admin's device.
// File extension: .planet-invite
message PlanetInvite {

    // Planet being invited to.
    Tag                 PlanetTag = 1;

    // Current epoch at the time of invite (for initial sync).
    Tag                 EpochTag = 2;

    // Newly generated member identity assigned by the admin.
    Tag                 MemberTag = 3;

    // Temporary private key for the invited member (encrypted with invite passphrase).
    // The member uses this to decrypt their initial EncryptedPlanetKey from the MemberEpoch.
    // Must be rotated immediately after join.
    bytes               TempPrivKey = 5;

    // Crypto suite matching the planet epoch.
    safe.CryptoKitID    CryptoKitID = 10;

    // Known vault addresses for initial peer discovery.
    repeated string     VaultAddrs = 15;

    // Planet epoch key encrypted for the temp member key (via EncryptToPeer).
    // InviteAccept decrypts this immediately so the member can participate in the epoch.
    bytes               EncryptedEpochKey = 20;

    // Signing public key of the admin who encrypted EncryptedEpochKey.
    // Needed for DecryptFromPeer (CryptoKit derives asymmetric key internally).
    bytes               EncryptorPubKey = 21;
}


// PlanetInviteOp is the client request to create or accept a member invite.
// Sent as a TxOp body in the request to amp://~/home/invite/new (create) or invite/accept.
message PlanetInviteOp {

    // Planet to create or accept an invite for.
    Tag                 PlanetTag = 1;

    // Passphrase used to encrypt the PlanetInvite for out-of-band delivery (create),
    // or to decrypt an incoming encrypted invite blob (accept).
    string              Passphrase = 5;

    // Encrypted PlanetInvite blob (accept only).
    // On create this is empty; the response returns the encrypted blob.
    bytes               SealedInvite = 10;
}


// SyncMsg is the envelope for all delta sync control messages between vault peers.
// Exactly one of the oneof fields is set per message.
message SyncMsg {
    oneof Body {
        SyncWatchList    WatchList    = 1;
        SyncRangeOffer   RangeOffer   = 2;
        SyncRangeRequest RangeRequest = 3;
    }
}

// SyncWatchList announces which planets a peer has data for, with high-water marks.
// Sent on peer connect and whenever the watch list changes.
message SyncWatchList {
    repeated SyncPlanetStatus Planets = 1;
}

// SyncPlanetStatus carries a planet UID and the peer's current high-water mark.
message SyncPlanetStatus {
    fixed64             PlanetID_0  = 1;
    fixed64             PlanetID_1  = 2;
    fixed64             HighWater_0 = 3;  // most recent TxTimeID
    fixed64             HighWater_1 = 4;
}

// SyncRangeOffer carries a hash over a TxTimeID range for a planet.
// Used in the Merkle bisection protocol to identify divergence between peers.
message SyncRangeOffer {
    fixed64             PlanetID_0 = 1;
    fixed64             PlanetID_1 = 2;
    fixed64             Start_0 = 3;      // range start (inclusive)
    fixed64             Start_1 = 4;
    fixed64             End_0 = 5;        // range end (inclusive)
    fixed64             End_1 = 6;
    bytes               RangeHash = 10;   // 32-byte hash over TxTimeIDs in [Start, End]
}

// SyncRangeRequest asks a peer to stream all TxMsgs in a range for a planet.
// Sent when a range hash mismatch is detected after bisection converges.
message SyncRangeRequest {
    fixed64             PlanetID_0 = 1;
    fixed64             PlanetID_1 = 2;
    fixed64             After_0 = 3;      // stream TxMsgs with TxTimeID > After
    fixed64             After_1 = 4;
}


// TransportType identifies the network transport used by a peer.
enum TransportType {
    TransportType_Nil       = 0;
    TransportType_TCP       = 1;
    TransportType_UDP       = 2;
    TransportType_Reticulum = 3;
}

// PeerAddr describes a reachable address for a vault peer.
message PeerAddr {
    TransportType       Transport = 1;    // which transport layer
    string              Address   = 2;    // transport-specific (e.g. "192.168.1.5:5192", Reticulum hash)
    float               Score     = 3;    // 0.0–1.0; higher = preferred; updated by connection quality
}


