syntax = "proto3";
package std;

option csharp_namespace = "art.media.platform.std";
option go_package = "github.com/art-media-platform/amp.SDK/amp/std";

import "amp/amp.core.proto";

enum TRS_Flags {
    FixedScale = 0;
    AutoScale  = 1;  // Dynamically adjust scale based on observer position.
}


// TRS (Translate Rotate Scale) IEEE 1207
// General purpose placement time, space, orientation, and/or geo-position.
message TRS {

    // Uniform spatial scale; if 0, scale is implicitly 1.0
    double              Sx = 1;

    // Special TRS behavior
    TRS_Flags           Flags = 2;

    // Spatial position
    double              Px = 3;
    double              Py = 4;
    double              Pz = 5;

    // Spatial rotation; if all values 0, Quaternion is unit identity
    double              Qx = 10;
    double              Qy = 11;
    double              Qz = 12;
    double              Qw = 13;

    // If non-zero and a globe surface is defined, this TRS is applied from the spherical position, normal, and scale associated with the given S2 tile cell.
    fixed64             TileS2 = 16;
}

message Matrix4x4 {

    // 16 doubles in row-major order
    double M00 = 1;
    double M01 = 2;
    double M02 = 3;
    double M03 = 4;

    double M10 = 5;
    double M11 = 6;
    double M12 = 7;
    double M13 = 8;

    double M20 = 9;
    double M21 = 10;
    double M22 = 11;
    double M23 = 12;

    double M30 = 13;
    double M31 = 14;
    double M32 = 15;
    double M33 = 16;

}

// General purpose Camera state
message CameraState {
    TRS    Placement = 1;
    float  Pitch     = 2; // degrees
    float  Yaw       = 3; // degrees
    float  Distance  = 5; // optional distance to anchor
    float  Altitude  = 6; // optional altitude above the surface
    float  Mass      = 9; // optional mass (inertia) of camera body


    float  NearPlane = 10; // optional near plane distance
    float  FarPlane  = 11; // optional far plane distance
    float  Fov       = 13; // field of view in degrees; 0 denotes orthographic camera
    int32  PixelsX   = 16; // viewport width in pixels
    int32  PixelsY   = 17; // viewport height in pixels

    string Mode      = 20; // optional camera mode description
}

message CameraOptions {
    float  MoveSpeed   = 1; // movement speed multiplier
    string Mode        = 2; // e.g. "orbit", "first-person", "flight", etc.
    string ModeTags    = 3; // e.g. "hide-altitude.present-fullscreen"
    int32  ShowUnits   = 4; // level of detail
}


// FileInfo a general-purpose file system meta info block.
message FileInfo {
    string Mode        = 1; // unix file mode label
    bool   IsDir       = 2; // true if item is a directory

    string DirName     = 4; // prepended to FileName forms full path
    string ItemName    = 5; // file/dir item name
    int32  ExtLen      = 6; // length of the file extension (0 if none)
    string ContentType = 8; // MIME type of the file (e.g. "image/png", "text/html", etc.);

    int64  CreatedAt   = 10; // UTC << 16
    int64  ModifiedAt  = 11; // UTC << 16
    int64  ByteSize    = 14; // data fork byte length
}


// Multi-purpose, future-proof text element or label.
message TextItem {
    string   Body  = 2; // atomic plain-text body
    amp.Tags Tags  = 4; // free use attachments or metadata
}

// ValueKind specfies the primary type of a JsonValue.
enum ValueKind {
    Null   = 0;
    False  = 1;
    True   = 2;
    Number = 3;
    String = 4;
}

// JsonValue is a general-purpose JSON value container.
// Though multiple fields can be set (e.g. a Number also encoded as a string,
//    the Kind field is which field is considered the primary source of truth.
message JsonValue {
    ValueKind          Kind   = 1;
    string             String = 2;
    double             Number = 3;
    repeated JsonValue Array  = 4;
}

// Generic report summary
message Report {
    TextItem Title   = 1;
    TextItem Caption = 2;

    repeated TextItem Errors   = 3;
    repeated TextItem Warnings = 4;
    repeated TextItem Messages = 5;
    repeated TextItem Debug    = 15;
}

// Labels is the bundled label struct for "described items" — media tracks,
// catalog entries, planet-level items, anything with a name + a 1-line
// subtitle + an optional grouping name + an optional long-form description.
//
// Use std.Attr.ItemLabels (this struct, flat per-item) for self-described
// items.  Use std.Attr.SeriesLabels (series of these structs keyed by item ID)
// when a parent channel maintains a series of described children.
//
// For raw single-text containers (messages, plain notes) prefer dedicated
// text attrs instead of Labels.
message Labels {
    string        Title       = 1;  // primary name
    string        Caption     = 2;  // 1-line subtitle (e.g. artist line)
    string        Collection  = 3;  // grouping label (e.g. album / playlist)
    string        About       = 4;  // long-form description / synopsis
}

// General purpose lightweight set of geo tiles in the shape of a rectangle - composed rectangle given a center and width/height.
// The units are typically mid H3 resolution with rectangular dimensions in units of font glyph size.
message Rect {

    PointFormat Format = 1; // specifies the type and format of Coords
    fixed64     Anchor = 2; // S2 or H3 tile index; also implies visual
    fixed64     R      = 3; // mm altitude from globe center or UTC64

    int32       Width  = 8; // mm
    int32       Height = 9; // mm

    int32       I = 10; // center offset
    int32       J = 11; // center offset
    int32       K = 12; // center offset
}




// General purpose polygonal path of geo tiles.
message GeoPath {

    enum RenderType {
        Point = 0;
        Path  = 1;
        Ring  = 2;
    }

    RenderType Type      = 1;
    float      ExtrudeLo = 4;  // If non-zero, extrude the path to this height
    float      ExtrudeHi = 5;  // If non-zero, extrude the path to this height

    PointFormat      Format = 14; // specifies the type and format of Coords
    repeated fixed64 Points = 15; // tile indices interleaved with associated UTC64 or Rmm based on Format.

}


enum PointFormat {
    S2  = 0; // (S2)      (1) uint64: lat,lng, (res)
    H3  = 1; // (H3)      (1) uint64: lat,lng, (res)
    S2T = 2; // (S2, T)   (2) uint64: lat,lng, (res), UTC64
    H3T = 3; // (H3, T)   (2) uint64: lat,lng, (res), UTC64
}


// MediaItem wraps a media track, feature, featurette, collection, album, or playlist.
message MediaItem {
    MediaFlags Flags      = 1; // describes this item
    amp.Tag    Tag        = 3; // free use
    double     StartAt    = 5; // starts playback at the given seconds offset
    double     Seconds    = 6; // playback duration in seconds

    float      Popularity = 16; // 0.0 to 1.0
    float      Ordering   = 17; // items are sorted by this value

    // string              CommonName = 1;
    // string              DebugLabel = 2;
    // bool                RequiresSubscription = 10;
    // bool                RequiresInternet     = 11;
}


enum MediaFlags {
    NoMedia             = 0;

    IsLive              = 0x0001;
    IsSeekable          = 0x0002;
    IsUnending          = 0x0004;
    NewChapter          = 0x0008;
    NewTrack            = 0x0010;

    HasAudio            = 0x0100;
    HasVideo            = 0x0200;
    HasSpeech           = 0x0400;
    NeedsNetwork        = 0x0800;

    // When set, the user is more likely to skipping short intervals than switch media items.
    SkipIsLikely        = 0x01000000;

}

// MediaSegment is one segment of a live or recorded media stream: an inline on-chain
// copy of the bytes plus a reference to the durable content-addressed blob.  Playback
// time is the exact integer rational TickDelta / TickRate (the QuickTime time model),
// so consecutive segments tile a stream exactly: TickOffset + TickDelta == the next
// segment's TickOffset.  For a byte-rate stream the natural tick is the byte.
message MediaSegment {
    int64       TickOffset = 1; // cumulative tick offset of this segment's start on the stream timeline
    int64       TickDelta  = 2; // this segment's duration as an exact tick span
    int64       TickRate   = 3; // ticks per second — the timescale (0 when the source rate is unknown)
    amp.Units   Units      = 4; // what one tick is (Bytes for a byte-stream; Samples / Seconds for sampled media)
    string      Format     = 5; // content (MIME) type
    bytes       Payload    = 6; // inline on-chain copy of the segment bytes (the integrity-check source)
    amp.BlobRef Blob       = 7; // the segment's durable content-addressed bytes
}

// Arg is a any-purpose key/value pair
message Arg {
    string Key   = 1;
    string Value = 2;
}

enum ColormapFlags {
    ColormapFlags_None = 0;
    ColormapFlags_Full = 0x01;
    ColormapFlags_Back = 0x02;
    ColormapFlags_Fore = 0x04;
}

enum SensorFlags {
    SensorFlags_None    = 0;
    SensorFlags_GyroUp  = 0x01;
}

enum AudioFlags {
    AudioFlags_None     = 0;
    AudioFlags_FFT      = 0x01;
}

message VisPreset {
    std.TextItem    Title       = 1;
    std.TextItem    Collection  = 2;
    std.TextItem    Credits     = 3;

    ColormapFlags   ColormapFlags = 6;
    SensorFlags     SensorFlags   = 7;
    AudioFlags      AudioFlags    = 8;

    float           AspectMin = 10; // y/x lower peg; 0 denotes no min
    float           AspectMax = 11; // y/x upper peg; 0 denotes no max

    string          AssetURI = 20; // VisualLayer asset URI (VisShader / VisPlexus / GForce / …)
    repeated Arg    Args     = 21; // free use arguments passed to the asset
}


// TileEase controls how a TileBand's profile transitions from its inner to outer radius.
enum TileEase {
    TileEase_Linear   = 0;
    TileEase_Circular = 1;   // 90-degree arc, normals trending up
    TileEase_Cubic    = 2;
}

// TileBand is the profile of one beveled ring of a tiled polygon mesh — the shareable, data
// form of the Unity authoring struct.  Bands stack back-to-front in array order.
// +X is 3 o'clock on the tile, +Y is up (outward), +Z is 12 o'clock.
message TileBand {
    string          Label          = 1;    // authoring label (cosmetic)
    bool            Enabled        = 2;
    float           AlphaMin       = 3;     // transparency range (propagates to position.w)
    float           AlphaMax       = 4;
    float           RadiusMin      = 5;     // ring radius range from tile center (1 = polygon edge)
    float           RadiusMax      = 6;
    float           YMin           = 7;     // altitude range above the tile plane (y=0)
    float           YMax           = 8;
    TileEase        YEase          = 9;     // inner→outer thickness transition
    int32           RadialSegments = 10;    // radial sections from RadiusMin to RadiusMax
    int32           EdgeSections   = 11;    // sections per polygon edge (excluding corners)
    int32           SegmentsPer360 = 12;    // corner sections per 360 degrees
    float           CornerRadius   = 13;    // corner bevel radius (0 = sharp)
    bool            Underside      = 14;    // band forms the tile underside (flips normals)
    float           TextureOffsetX = 15;
    float           TextureOffsetY = 16;
    float           TextureOffsetZ = 17;
    float           TextureOffsetW = 18;
    float           TextureScaleX  = 19;
    float           TextureScaleY  = 20;
    float           TextureScaleZ  = 21;
    float           TextureScaleW  = 22;
}

// TileMeshSpec is a procedural tile-mesh recipe: a polygon swept into beveled bands.
// The geometry-side analog of VisPreset; consumed by the runtime tile mesher.
message TileMeshSpec {
    repeated TileBand   Bands         = 1;
    float               Thickness     = 2;  // thickness as a ratio of the tile's smaller dimension
    int32               Sides         = 3;  // polygon sides (e.g. 0, 6 = pointy-top hex)
    float               Rotate        = 4;  // degrees to rotate the base polygon about up (e.g. 30 = flat-top hex)
}

// SkinSpec is the shareable unit of a visual mod: a geometry source composed with an ordered
// stack of VisualLayers (skins / effects).  Geometry is TileMesh (procedural recipe) when its
// Bands are set, else the built asset at MeshAssetURI.  Layers apply back-to-front; each
// VisPreset.AssetURI names a VisualLayer (VisShader / VisPlexus / GForce / …).
message SkinSpec {
    string              MeshAssetURI = 1;   // built mesh / Model / VisualScope prototype
    TileMeshSpec        TileMesh     = 2;   // OR a procedural tile recipe (precedence when Bands set)
    repeated VisPreset  Layers       = 3;   // ordered VisualLayers
}

// AtmosphereEffect is one tagged entry in an AtmosphereSpec.  Label identifies the
// category the entry contributes to (Sky / Sun / Night / Fog — see std.Atmosphere.Label*
// for canonical strings); URI selects the variant within that category.
//
// URI semantics, when Enabled = true:
//   non-empty → the named effect asset (resolved via AssetRequest / built-in switch)
//   empty     → use the category default (std.Atmosphere.SkyEarth / SunStandard / ...)
// Enabled = false disables the effect entirely; URI is retained so toggling on
// restores the previous selection without round-trip loss.
message AtmosphereEffect {
    string Label   = 1;   // category id; canonical values in std.Atmosphere.Label*
    string URI     = 2;   // effect asset URI; empty + Enabled = true → category default
    bool   Enabled = 3;   // off-switch independent of URI presence
}

// AtmosphereSpec composes a manifold's atmosphere from tagged effect entries.  Each
// category (Sky / Sun / Night / Fog) is independently overridable; a planet author can
// ship a partial set and inherit the rest.  Multiple entries with the same Label are
// reserved for future stacking (e.g., two compatible Sky layers); v240 honors the first
// entry per category.
//
// Category functional split:
//   Sky — the always-on base aesthetic (zenith / horizon shell, limb sheen at the edge).
//   Sun — time-of-day phenomena that get in the way of legibility during map work
//         (sunset glow, terminator color, Henyey-Greenstein forward scatter).
//   Night — night-side dim and cool tinting; off → uniform daylight everywhere.
//   Fog — exponential aerial perspective on tiles; seam-hider for distant edges.  Usually on.
message AtmosphereSpec {
    repeated AtmosphereEffect Effects = 1;
}


// TileServerKind narrows what a tile backend serves so consumers can compose
// stacks (base imagery + labels + hillshade + weather + terrain) without
// guessing from URL strings.
enum TileServerKind {
    TileServerKind_Unspecified      = 0;
    TileServerKind_RasterImagery    = 1;   // base map raster (e.g. OSM, satellite)
    TileServerKind_RasterLabels     = 2;   // labels-only overlay
    TileServerKind_RasterHillshade  = 3;   // hillshade overlay
    TileServerKind_RasterContours   = 4;   // contour-line overlay
    TileServerKind_RasterWeather    = 5;   // radar / clouds / precipitation
    TileServerKind_RasterTerrainRGB = 10;  // elevation encoded into RGB (Mapbox, Terrarium)
    TileServerKind_TerrainQuantized = 11;  // Cesium quantized-mesh terrain
    TileServerKind_VectorMVT        = 20;  // Mapbox Vector Tiles
}

// TileProjection identifies the cartographic projection of the tile pyramid.
enum TileProjection {
    TileProjection_Unspecified = 0;
    TileProjection_WebMercator = 1;  // EPSG:3857 — universal slippy raster
    TileProjection_Geodetic    = 2;  // EPSG:4326 (lat/lng equirect)
}

// TileServerScheme identifies the (z, x, y) tile addressing convention.
enum TileServerScheme {
    TileServerScheme_Unspecified = 0;
    TileServerScheme_XYZ_Slippy  = 1;  // {z}/{x}/{y}, Y from north (slippy / OSM)
    TileServerScheme_TMS         = 2;  // {z}/{x}/{y}, Y from south (TMS)
    TileServerScheme_QuadKey     = 3;  // Bing-style quadkey
}

// TileServerAuth describes how a per-tile API key is delivered.
enum TileServerAuth {
    TileServerAuth_None      = 0;
    TileServerAuth_QueryKey  = 1;  // appended as ?<APIKeyToken>=<key>
    TileServerAuth_HeaderKey = 2;  // sent in <AuthHeader>
    TileServerAuth_Cookie    = 3;
}

// TileServer describes a Web-Mercator (or projection-tagged) tile backend.
// Consumers (TileService and friends) use this exclusively — no provider
// strings, no hard-coded catalogs, no custom code per provider.  Stored
// as repeated items under std.Attr.TileServer; channel selectors filter
// by Kind / Projection / region tags.
message TileServer {

    // Stable identifier (e.g. "osm", "mapbox.streets", "stamen.toner").
    string              ID            = 1;

    // Human-readable display name.
    string              Name          = 2;

    // Attribution string shown on the rendered map per provider terms.
    string              Attribution   = 3;

    // What this backend serves — drives stack composition + shader pick.
    TileServerKind      Kind          = 4;

    // Projection of the tile pyramid (almost always WebMercator).
    TileProjection      Projection    = 5;

    // Y-axis convention + addressing scheme.
    TileServerScheme    Scheme        = 6;

    // URL template; supports {z} {x} {y} {s} {access_token} {key}
    // e.g. "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" or
    string              URLTemplate   = 10;

    // Subdomains for {s} substitution (e.g. ["a","b","c"]).
    repeated string     Subdomains    = 11;

    // Name of the auth-token placeholder in URLTemplate (e.g. "access_token"
    // for "...?{access_token}").  Empty for no-auth providers.
    string              APIKeyToken   = 12;

    // How the API key is delivered.
    TileServerAuth      AuthMethod    = 13;

    // Header name when AuthMethod = HeaderKey (e.g. "Authorization", "X-API-Key").
    string              AuthHeader    = 14;

    // Zoom range supported by the provider.
    int32               MinZoom       = 20;
    int32               MaxZoom       = 21;

    // Tile pixel dimension (typically 256 or 512).  0 = unspecified, treat as 256.
    int32               TileSizePx    = 22;

    // Per-host minimum interval between requests (provider politeness hint).
    // 0 = unspecified.  OSM ≈ 500.
    int32               MinIntervalMs = 23;

    // MIME content type of returned tiles ("image/png", "image/jpeg", "application/x-protobuf").
    string              ContentType   = 30;

    // For terrain kinds, the elevation encoding scheme ("mapbox-rgb", "terrarium").
    string              ElevationEncoding = 31;

}


// BodyEncoding is how an HTTP request body is encoded.
enum BodyEncoding {
    JSON = 0;  // application/json
    Form = 1;  // application/x-www-form-urlencoded
}

// LoginForm is the recipe for exchanging a username + password for a session token:
// POST the credentials to an endpoint and read the minted token from the response.
//
// A LoginForm carries NO secrets — only the *shape* of that exchange (where to POST,
// how the body is encoded, and how the credential and token fields are named).
message LoginForm {
    BodyEncoding        Encoding     = 1;  // how the request body is encoded
    string              UserField    = 2;  // request field name for the username (default "username")
    string              PassField    = 3;  // request field name for the password (default "password")
    string              TokenPostURL = 6;  // POST endpoint that mints the token
    string              TokenField   = 8;  // response field holding the minted token (e.g. "token")
}

