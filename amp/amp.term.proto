syntax = "proto3";

// TermIO is the wire frame for amp.Terminal — a teletype that rides an amp
// channel.  One frame is one edit on the session tape at (sessionNode,
// std.TerminalTape, track lane): the attr is fold-exempt (EditFlow_Tape), the
// EditID stamped at commit is the time axis, and the constant ItemID
// discriminates the track (out / in / keyframe).  The persisted tape is a
// read-only "console"; its live tail driven interactively is a "terminal".
// See AOM/AD-app-terminal.md.
package amp;

option go_package    = "github.com/art-media-platform/amp.SDK/amp";
option csharp_namespace = "art.media.platform";

// TermBlock is one contiguous run of terminal bytes — typically one PTY read.
// Blocks within a TermIO are ordered; concatenating their Data reproduces the
// raw stream.
message TermBlock {

    // TermDir is the flow direction of a terminal byte block.
    enum TermDir {
        Unspecified  = 0;
        HostToClient = 1; // PTY output  -> client stdout
        ClientToHost = 2; // keystrokes  -> PTY stdin
    }

    reserved 3; // freed: per-block CapturedAt

    // Raw, opaque terminal bytes.  Never UTF-8-validated or transformed; ANSI is
    // rendered only by the receiving emulator.
    bytes Data = 1;

    // Monotonic byte offset of this block's first byte from session start in this
    // direction.  Lets a receiver detect a gap (a dropped laggard) and order or
    // dedupe blocks independently of arrival.
    int64 SeqOffset = 2;

    // Flow direction.  Per block so a captured batch is self-describing and a
    // future muxed stream stays valid.
    TermDir Dir = 4;
}

// TermIO is one flush of batched terminal I/O for a single session/stream.
message TermIO {

    // TermMode flags a frame that is more than ordinary stream bytes: a
    // self-contained Keyframe (the DVR's scrub seek target — jump to the nearest
    // keyframe <= T, then replay forward to T) or a Resize.
    enum TermMode {
        Unspecified = 0; // ordinary terminal byte stream
        Keyframe    = 1; // self-contained full-screen snapshot
        Resize      = 2; // new cols x rows dimensions (M4)
    }

    reserved 1, 2, 6, 7; // freed: SessionID_0/1 (now the NodeID), FlushedAt, Keyframe bool

    // Monotonic batch sequence within the session+direction (0,1,2,...).  Earns
    // its place precisely because the series is sparse: a time gap is normal
    // (idle), so this counter is how a reader tells idle apart from a dropped
    // frame.  SeqOffset gives byte-exact detail within a direction.
    uint64 BatchSeq = 5;

    // Frame classification (default Unspecified = ordinary stream).  Keyframe is
    // the DVR seek target; Resize carries dimensions (M4).
    TermMode Mode = 8;

    // The ordered byte blocks in this flush.  Concatenate Data in order to
    // reconstruct the raw stream.
    repeated TermBlock Blocks = 10;
}
